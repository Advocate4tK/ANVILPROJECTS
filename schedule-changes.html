<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Change Requests</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;600;700&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .change-card {
            background: var(--surface);
            border-radius: 12px;
            border-left: 4px solid var(--amber);
            padding: 20px 24px;
            margin-bottom: 14px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.15s;
        }
        .change-card:hover { box-shadow: var(--shadow-md); }
        .change-card.resolved { opacity: 0.78; }
        .change-card.resolved:hover { opacity: 1; }
        .change-card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .game-title { font-family: 'Barlow Condensed', sans-serif; font-size: 1.15rem; font-weight: 800; color: var(--deep); letter-spacing: 0.3px; }
        .game-meta  { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
        .status-pill {
            font-size: 0.72rem; font-weight: 700; padding: 3px 11px;
            border-radius: 20px; white-space: nowrap; flex-shrink: 0;
            letter-spacing: 0.3px;
        }
        .pill-open     { background: #fef3c7; color: #78350f; }
        .pill-resolved { background: #dcfce7; color: #14532d; }
        .request-box {
            background: #fffbeb;
            border: 1px solid #fde68a;
            border-left: 3px solid var(--amber);
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.83rem;
            color: var(--text);
            word-break: break-word;
            margin-bottom: 12px;
        }
        .current-refs {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 12px;
        }
        .ref-badge { background: rgba(9,20,42,0.07); color: var(--deep); font-size:0.72rem; font-weight:700; padding:2px 8px; border-radius:8px; display:inline-block; margin:0 3px; letter-spacing:0.2px; }
        .action-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-resolve  { background: var(--accent); color: var(--deep); border: none; border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s, transform 0.12s; }
        .btn-resolve:hover  { background: var(--accent-dark); color: white; transform: translateY(-1px); }
        .btn-dismiss  { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 7px 16px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
        .btn-dismiss:hover  { border-color: var(--danger); color: var(--danger); }
        .btn-contact  { background: none; border: 1px solid var(--deep); color: var(--deep); border-radius: 8px; padding: 7px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.15s; }
        .btn-contact:hover  { background: var(--deep); color: white; }
        .btn-reopen { background: none; border: 1px solid #f59e0b; color: #78350f; border-radius: 8px; padding: 6px 13px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
        .btn-reopen:hover { background: #fef3c7; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.92rem; }
        .empty-state .big { font-size: 3rem; margin-bottom: 12px; }
        #filterRow { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
        .action-msg { font-size: 0.8rem; margin-left: 8px; }
        .resolved-header {
            display: flex; align-items: center; gap: 10px;
            cursor: pointer; user-select: none;
        }
        .resolved-header:hover { opacity: 0.85; }
        .toggle-arrow { font-size: 0.7rem; color: var(--accent-dark); flex-shrink: 0; transition: transform 0.2s; }
        .change-card.resolved.expanded .toggle-arrow { transform: rotate(90deg); }
        .resolved-game-num { font-family: 'JetBrains Mono', monospace; font-size: 0.66rem; font-weight: 600; color: #bbb; letter-spacing: 0.5px; flex-shrink: 0; }
        .resolved-matchup { font-family: 'Barlow Condensed', sans-serif; font-size: 1rem; font-weight: 800; color: var(--accent-dark); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .resolved-meta { font-size: 0.75rem; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
        .card-body { display: none; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
        .change-card.resolved.expanded .card-body { display: block; }

        /* Resolved controls bar */
        #resolvedControls {
            display: none;
            background: #f8f6f2;
            border: 1px solid #e2d9ce;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 14px;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-pill {
            background: #fff;
            border: 1px solid #e2d9ce;
            color: #09142a;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.15s;
        }
        .filter-pill.active { background: #09142a; color: #fff; border-color: #09142a; }
        .filter-pill:hover:not(.active) { border-color: #09142a; }
        .controls-sep { width: 1px; height: 22px; background: #e2d9ce; flex-shrink: 0; }

        /* Resolved summary strip */
        #resolvedSummary {
            display: none;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: #14532d;
            gap: 18px;
            flex-wrap: wrap;
            align-items: center;
        }
        .res-stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
        .res-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 800; color: #09142a; }
        .res-stat-lbl { font-size: 0.72rem; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Urgency badge */
        .urgency-badge {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            color: #dc2626;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 2px 9px;
            border-radius: 20px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
            animation: urgency-pulse 2s ease-in-out infinite;
        }
        @keyframes urgency-pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.55; }
        }
        .time-since { font-size: 0.75rem; color: #999; margin-top: 2px; }
        .assignor-note-box { background:#eaf3ff; border-left:3px solid #1a3a6b; border-radius:6px; padding:10px 14px; margin-bottom:12px; font-size:0.82rem; }
        .assignor-note-box .note-lbl { font-size:0.72rem; color:#888; margin-bottom:3px; font-weight:700; letter-spacing:0.4px; text-transform:uppercase; }
        .assignor-note-box .note-body { color:#333; line-height:1.5; }
        .note-form-wrap { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
        .note-form-wrap textarea { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:8px 10px; border:1px solid var(--border); border-radius:6px; resize:vertical; min-height:52px; color:var(--text); background:#fafafa; }
        .btn-note { background:#1a3a6b; color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:0.79rem; font-weight:700; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:5px; transition:background 0.15s; }
        .btn-note:hover { background:#0f2a52; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚠️ Schedule Change Requests</h1>
            <p class="subtitle">Games flagged for rescheduling by club admins</p>
        </header>

        <main>
            <div id="filterRow">
                <a href="admin.html" class="btn btn-outline" style="font-size:0.85rem; padding:8px 16px;">← Admin Portal</a>
                <a href="assignor-workstation.html" class="btn btn-outline" style="font-size:0.85rem; padding:8px 16px;">📋 Assignor Workstation</a>
                <button onclick="loadChanges()" class="btn btn-secondary" style="font-size:0.85rem; padding:8px 16px;">🔄 Refresh</button>
                <button id="showResolvedBtn" onclick="onShowResolvedChange()" class="filter-pill" style="margin-left:auto;">Show Resolved</button>
            </div>

            <!-- Resolved controls (visible only when Show Resolved is checked) -->
            <div id="resolvedControls">
                <!-- Sort -->
                <span style="font-size:0.75rem; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap;">Sort:</span>
                <button class="filter-pill active" id="sortNewest" onclick="setSort('desc')">Most Recent</button>
                <button class="filter-pill" id="sortOldest" onclick="setSort('asc')">Oldest</button>

                <div class="controls-sep"></div>

                <!-- Date range -->
                <span style="font-size:0.75rem; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap;">Range:</span>
                <button class="filter-pill active" id="rangeAll"   onclick="setRange('all')">All Time</button>
                <button class="filter-pill"        id="range7"     onclick="setRange('7')">Last 7 Days</button>
                <button class="filter-pill"        id="range30"    onclick="setRange('30')">Last 30 Days</button>

                <div class="controls-sep"></div>

                <!-- Club filter -->
                <span style="font-size:0.75rem; font-weight:700; color:#888; text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap;">Club:</span>
                <select id="clubFilterSelect" onchange="setClubFilter()" style="font-family:'DM Sans',sans-serif; font-size:0.82rem; font-weight:600; padding:5px 10px; border:1px solid #e2d9ce; border-radius:20px; background:#fff; color:#09142a; cursor:pointer; outline:none;">
                    <option value="">All Clubs</option>
                </select>

                <div class="controls-sep"></div>

                <!-- Collapse / Expand all -->
                <button class="filter-pill" onclick="collapseAll()">Collapse All</button>
                <button class="filter-pill" onclick="expandAll()">Expand All</button>

                <div class="controls-sep"></div>

                <!-- Export -->
                <button class="filter-pill" onclick="exportCSV()" style="background:#09142a; color:#fff; border-color:#09142a;">⬇ Export CSV</button>
            </div>

            <!-- Resolved stats summary (visible only when Show Resolved is checked) -->
            <div id="resolvedSummary">
                <span style="font-size:0.82rem; font-weight:700; color:#14532d;">✅ Resolved Overview</span>
                <div class="res-stat"><span class="res-stat-val" id="statThisWeek">—</span><span class="res-stat-lbl">This Week</span></div>
                <div class="res-stat"><span class="res-stat-val" id="statThisMonth">—</span><span class="res-stat-lbl">This Month</span></div>
                <div class="res-stat"><span class="res-stat-val" id="statTotal">—</span><span class="res-stat-lbl">All Time</span></div>
                <div class="res-stat"><span class="res-stat-val" id="statAvgTime">—</span><span class="res-stat-lbl">Avg Resolution</span></div>
            </div>

            <div id="summary" style="margin-bottom:16px;"></div>
            <div id="changesList"><p style="color:#888; font-size:0.9rem;">Loading…</p></div>
        </main>

        <footer>
            <p>&copy; 2026 Referee Scheduling System by Anvil Arts</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script>
    // Wire supabaseClient into the airtableClient name used throughout this page
    const airtableClient = supabaseClient;
    </script>
    <script>
    let refById   = {};
    let clubById  = {}; // Airtable club record ID → club name
    let sortDir   = 'desc';
    let dateRange = 'all';
    let clubFilter = '';
    let allLoadedRecords = []; // cache for export

    // ── Club color palette ────────────────────────────────────────────────────
    const CLUB_COLORS = ['#3b82f6','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#84cc16','#f97316','#ec4899','#14b8a6','#a855f7'];
    function getClubColor(name) {
        let h = 0;
        for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
        return CLUB_COLORS[Math.abs(h) % CLUB_COLORS.length];
    }

    // ── Show resolved state helper ────────────────────────────────────────────
    function isShowingResolved() {
        return document.getElementById('showResolvedBtn').classList.contains('active');
    }

    // ── Time helpers ──────────────────────────────────────────────────────────
    function getTimeSince(date) {
        if (!date || isNaN(date)) return null;
        const diffMs = Date.now() - date.getTime();
        if (diffMs < 0) return null;
        const mins = Math.floor(diffMs / 60000);
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(diffMs / 3600000);
        if (hrs < 24) return `${hrs}h ago`;
        const days = Math.floor(diffMs / 86400000);
        return `${days}d ago`;
    }

    // ── Timestamp helpers ─────────────────────────────────────────────────────
    function getResolvedTs(r) {
        const matches = [...(r.fields['Notes'] || '').matchAll(/\[RESOLVED\s*[–-]\s*([^\]]+)\]/gi)];
        return matches.length ? new Date(matches[matches.length - 1][1].trim()) : new Date(0);
    }

    function getRequestTs(r) {
        const match = (r.fields['Notes'] || '').match(/\[CHANGE REQUEST[^\]]*–\s*([^\]]+)\]/i);
        return match ? new Date(match[1].trim()) : null;
    }

    function avgResolutionTime(resolvedRecords) {
        let total = 0, count = 0;
        resolvedRecords.forEach(r => {
            const reqTs = getRequestTs(r);
            const resTs = getResolvedTs(r);
            if (reqTs && resTs && resTs > reqTs) {
                total += resTs - reqTs;
                count++;
            }
        });
        if (!count) return '—';
        const avgMs = total / count;
        const hrs = Math.round(avgMs / (1000 * 60 * 60));
        if (hrs < 24) return `${hrs}h`;
        return `${Math.round(hrs / 24)}d`;
    }

    // ── Sort / filter controls ────────────────────────────────────────────────
    function setSort(dir) {
        sortDir = dir;
        document.getElementById('sortNewest').classList.toggle('active', dir === 'desc');
        document.getElementById('sortOldest').classList.toggle('active', dir === 'asc');
        renderCards();
    }

    function setRange(range) {
        dateRange = range;
        ['rangeAll','range7','range30'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(range === 'all' ? 'rangeAll' : range === '7' ? 'range7' : 'range30').classList.add('active');
        renderCards();
    }

    function setClubFilter() {
        clubFilter = document.getElementById('clubFilterSelect').value;
        renderCards();
    }

    function collapseAll() {
        document.querySelectorAll('.change-card.resolved.expanded').forEach(el => el.classList.remove('expanded'));
    }

    function expandAll() {
        document.querySelectorAll('.change-card.resolved').forEach(el => el.classList.add('expanded'));
    }

    // ── Misc helpers ──────────────────────────────────────────────────────────
    function buildGameNum(f) {
        const skip = new Set(['sc','fc','soccer','club','boys','girls','united','youth','the','of']);
        const sourceClub = f['Source Club'] || f['Home Team'] || '';
        const words = sourceClub.split(/\s+/).filter(w => w.length > 1 && !skip.has(w.toLowerCase()));
        const abbr = words.length === 0 ? '' : words.length === 1 ? words[0].substring(0,2).toUpperCase() : words.map(w => w[0].toUpperCase()).slice(0,2).join('');
        const dateStr = f['Date'] || '';
        const m = parseInt((dateStr).split('-')[1]);
        const season = m >= 3 && m <= 6 ? 'SP' : m >= 7 && m <= 8 ? 'SU' : m >= 9 && m <= 11 ? 'FA' : 'WI';
        const yr = (dateStr.split('-')[0] || '').slice(-2);
        const seq  = String(f['Game Number'] || f['Auto Number'] || '').padStart(3, '0');
        const type = (f['game_type'] || 'Rec').toUpperCase() === 'COMP' ? 'COMP' : 'REC';
        return seq && seq !== '000' ? `${abbr}${season}${type}${seq}${yr}` : '';
    }

    function toggleCollapse(id) {
        document.getElementById('card_' + id)?.classList.toggle('expanded');
    }

    function formatTime(t) {
        if (!t) return '—';
        const [h, m] = t.substring(0,5).split(':').map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function resolveRef(val) {
        if (!val) return '';
        // Handle JSON array string from pre-migration Airtable data e.g. '["1140"]'
        if (typeof val === 'string' && val.startsWith('[')) {
            try { val = JSON.parse(val); } catch(e) { return val; }
        }
        if (Array.isArray(val)) return val.map(id => refById[id] || '').filter(Boolean).join(', ');
        return val; // plain string name (Supabase new assignments)
    }

    function extractRequests(notes) {
        if (!notes) return [];
        const blocks = notes.split(/\[CHANGE REQUEST/i).slice(1);
        if (!blocks.length) return [];
        // Only show the most recent request — history lives in Notes
        const b = blocks[blocks.length - 1];
        const full = '[CHANGE REQUEST' + b;
        const ts      = (full.match(/\[CHANGE REQUEST[^\]]*–\s*([^\]]+)\]/i))?.[1]?.trim() || '';
        const reqDate = (full.match(/Requested Date:\s*(\S+)/i))?.[1] || '';
        const reqTime = (full.match(/Requested Time:\s*(\S+)/i))?.[1] || '';
        const reason  = (full.match(/Reason:\s*(.+)/i))?.[1]?.trim()  || '';
        const reqBy   = (full.match(/Requested by:\s*(.+)/i))?.[1]?.trim() || '';
        return [{ ts, reqDate, reqTime, reason, reqBy }];
    }

    function extractAssignorNote(notes) {
        if (!notes) return null;
        const matches = [...notes.matchAll(/\[ASSIGNOR NOTE\s*[–-]\s*([^\]]+)\]([\s\S]*?)(?=\[|$)/gi)];
        if (!matches.length) return null;
        const last = matches[matches.length - 1];
        return { ts: last[1].trim(), message: last[2].trim() };
    }

    function formatRequestHtml(requests) {
        if (!requests.length) return `<div class="request-box" style="color:#aaa;">No change details found in notes.</div>`;
        return requests.map(req => {
            const lines = [
                req.ts                       ? `<div style="font-size:0.78rem; color:#888; margin-bottom:4px;">Submitted: ${req.ts}</div>` : '',
                (req.reqDate || req.reqTime) ? `<div><strong>Requested reschedule:</strong> ${req.reqDate || ''} ${req.reqTime ? formatTime(req.reqTime) : ''}</div>` : '',
                req.reason                   ? `<div><strong>Reason:</strong> ${req.reason}</div>` : '',
                req.reqBy                    ? `<div><strong>Requested by:</strong> ${req.reqBy}</div>` : ''
            ].filter(Boolean).join('');
            return `<div class="request-box" style="white-space:normal;">${lines}</div>`;
        }).join('');
    }

    // ── Export CSV ────────────────────────────────────────────────────────────
    function exportCSV() {
        const resolved = allLoadedRecords.filter(r => (r.fields['Game Status']||'').toLowerCase() === 'change resolved');
        if (!resolved.length) { alert('No resolved records to export.'); return; }
        const rows = [['Game ID','Home Team','Away Team','Date','Time','Age Group','Resolved At','Avg Resolution Time']];
        resolved.forEach(r => {
            const f = r.fields;
            const resTs = getResolvedTs(r);
            const reqTs = getRequestTs(r);
            let dur = '';
            if (reqTs && resTs && resTs > reqTs) {
                const hrs = Math.round((resTs - reqTs) / (1000 * 60 * 60));
                dur = hrs < 24 ? `${hrs}h` : `${Math.round(hrs/24)}d`;
            }
            rows.push([
                r.id,
                `"${(f['Home Team']||'').replace(/"/g,'""')}"`,
                `"${(f['Away Team']||'').replace(/"/g,'""')}"`,
                f['Date']||'',
                f['Time']||'',
                f['Age Group']||'',
                resTs.getTime() > 0 ? resTs.toLocaleString() : '',
                dur
            ]);
        });
        const csv = rows.map(r => r.join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `resolved-changes-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
    }

    // ── Main load ─────────────────────────────────────────────────────────────
    async function loadChanges() {
        const container    = document.getElementById('changesList');
        const summaryEl    = document.getElementById('summary');
        container.innerHTML = '<p style="color:#888; font-size:0.9rem;">Loading…</p>';

        try {
            const [games, refs, clubs] = await Promise.all([
                airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.GAMES,    { maxRecords: 1000 }),
                airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.REFEREES, { maxRecords: 500 }),
                airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.CLUBS,    { maxRecords: 200 })
            ]);

            refs.forEach(r  => { refById[r.id]  = r.fields['Name']      || ''; });
            clubs.forEach(r => { clubById[r.id] = r.fields['Club Name'] || ''; });

            const changeGames = games.filter(r => {
                const s = (r.fields['Game Status'] || '').toLowerCase();
                if (isShowingResolved()) return s === 'change requested' || s === 'change resolved';
                return s === 'change requested';
            });

            allLoadedRecords = changeGames;

            // Populate club filter dropdown — use Airtable clubs + any Source Club values
            const airtableClubNames = clubs.map(c => c.fields['Club Name'] || c.fields['Name'] || '').filter(Boolean);
            const clubsWithRecords = new Set(changeGames.map(r => getClubName(r)).filter(Boolean));
            const allClubOptions = [...new Set([...airtableClubNames, ...clubsWithRecords])].sort();
            const clubSel = document.getElementById('clubFilterSelect');
            const prevVal = clubSel.value;
            clubSel.innerHTML = '<option value="">All Clubs</option>' +
                allClubOptions.map(c => `<option value="${c}" ${c === prevVal ? 'selected' : ''}>${c}</option>`).join('');

            // Resolved stats
            const allResolved = changeGames.filter(r => (r.fields['Game Status']||'').toLowerCase() === 'change resolved');
            const now = new Date();
            const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate() - now.getDay()); startOfWeek.setHours(0,0,0,0);
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
            document.getElementById('statThisWeek').textContent  = allResolved.filter(r => getResolvedTs(r) >= startOfWeek).length;
            document.getElementById('statThisMonth').textContent = allResolved.filter(r => getResolvedTs(r) >= startOfMonth).length;
            document.getElementById('statTotal').textContent     = allResolved.length;
            document.getElementById('statAvgTime').textContent   = avgResolutionTime(allResolved);

            const openRecords = changeGames.filter(r => (r.fields['Game Status'] || '').toLowerCase() === 'change requested');
            const openCount = openRecords.length;
            if (openCount > 0) {
                const clubCounts = {};
                openRecords.forEach(r => { const c = getClubName(r); clubCounts[c] = (clubCounts[c] || 0) + 1; });
                const clubBreakdown = Object.entries(clubCounts).sort((a,b) => a[0].localeCompare(b[0])).map(([c, n]) => `${c} (${n})`).join(' &nbsp;·&nbsp; ');
                summaryEl.innerHTML = `<div style="background:#fdebd0; border:1px solid #f0a500; border-radius:8px; padding:12px 18px; font-size:0.88rem; color:#935116; font-weight:600;">
                    ⚠️ ${openCount} open change request${openCount !== 1 ? 's' : ''} &nbsp;&nbsp;<span style="font-weight:400; font-size:0.83rem;">${clubBreakdown}</span>
                </div>`;
            } else {
                summaryEl.innerHTML = '';
            }

            renderCards();

        } catch(err) {
            document.getElementById('changesList').innerHTML = `<p style="color:#e74c3c;">Error loading data: ${err.message}</p>`;
        }
    }

    function getClubName(r) {
        // Prefer Source Club (written at submission time — most reliable)
        if (r.fields['Source Club']) return r.fields['Source Club'];
        // Fallback: resolve linked Club record
        const linked = r.fields['Club'];
        if (Array.isArray(linked) && linked.length > 0) {
            const name = clubById[linked[0]];
            if (name) return name;
        }
        return r.fields['Home Team'] || 'Unknown';
    }

    // ── Render (uses cached records + current filter/sort state) ──────────────
    function renderCards() {
        const container    = document.getElementById('changesList');
        const showResolved = isShowingResolved();

        if (!allLoadedRecords.length) {
            container.innerHTML = `<div class="empty-state"><div class="big">✅</div>No open change requests — you're all clear.</div>`;
            return;
        }

        // Apply date range filter to resolved records
        const cutoff = dateRange === 'all' ? null : new Date(Date.now() - parseInt(dateRange) * 24 * 60 * 60 * 1000);

        // Apply club filter
        const filtered = allLoadedRecords.filter(r => {
            const isResolved = (r.fields['Game Status']||'').toLowerCase() === 'change resolved';
            if (isResolved && cutoff && getResolvedTs(r) < cutoff) return false;
            if (clubFilter && getClubName(r) !== clubFilter) return false;
            return true;
        });

        if (!filtered.length) {
            const msg = clubFilter
                ? `No change requests for <strong>${clubFilter}</strong> with the current filters.`
                : 'No records match the current filters.';
            container.innerHTML = `<div class="empty-state"><div class="big">🔍</div>${msg}</div>`;
            return;
        }

        // Group by club
        const byClub = {};
        filtered.forEach(r => {
            const club = getClubName(r);
            if (!byClub[club]) byClub[club] = [];
            byClub[club].push(r);
        });

        container.innerHTML = Object.entries(byClub).sort().map(([club, records]) => {
            const clubColor = getClubColor(club);
            const cards = records
                .sort((a, b) => {
                    const isResA = (a.fields['Game Status']||'').toLowerCase() === 'change resolved';
                    const isResB = (b.fields['Game Status']||'').toLowerCase() === 'change resolved';
                    if (isResA && isResB) {
                        const cmp = getResolvedTs(a) - getResolvedTs(b);
                        return sortDir === 'asc' ? cmp : -cmp;
                    }
                    if (!isResA && isResB) return -1;
                    if (isResA && !isResB) return 1;
                    return (a.fields['Date']||'').localeCompare(b.fields['Date']||'');
                })
                .map(r => {
                    const f          = r.fields;
                    const isResolved = (f['Game Status']||'').toLowerCase() === 'change resolved';
                    const center     = resolveRef(f['Center Referee']);
                    const ar1        = resolveRef(f['AR 1']);
                    const ar2        = resolveRef(f['AR 2']);
                    const refsHtml   = [center && `<span class="ref-badge">⚽ ${center}</span>`,
                                        ar1    && `<span class="ref-badge">AR1 ${ar1}</span>`,
                                        ar2    && `<span class="ref-badge">AR2 ${ar2}</span>`].filter(Boolean).join('') || '<em>None assigned</em>';

                    const requests    = extractRequests(f['Notes'] || '');
                    const requestHtml = formatRequestHtml(requests);
                    const note        = extractAssignorNote(f['Notes'] || '');
                    const noteDisplayHtml = note ? `<div class="assignor-note-box"><div class="note-lbl">💬 Assignor Note · ${note.ts}</div><div class="note-body">${note.message}</div></div>` : '';
                    const noteFormHtml = `<div class="note-form-wrap"><textarea id="note_${r.id}" placeholder="${note ? 'Update note for club…' : 'Add a note for the club…'}"></textarea><div><button class="btn-note" onclick="saveAssignorNote('${r.id}')">💬 ${note ? 'Update Note' : 'Add Note for Club'}</button></div></div>`;

                    const adminEmail = f['Club Admin Email'] || '';
                    const contactBtn = adminEmail
                        ? `<a href="mailto:${adminEmail}?subject=Re: Schedule Change Request — ${f['Home Team']||''} vs ${f['Away Team']||''}" class="btn-contact">✉ Contact Club</a>`
                        : '';

                    // Urgency: game within 72 hours
                    const gameDate = f['Date'] ? new Date(f['Date'] + 'T00:00:00') : null;
                    const hoursUntilGame = gameDate ? (gameDate - Date.now()) / 3600000 : Infinity;
                    const isUrgent = !isResolved && hoursUntilGame >= 0 && hoursUntilGame <= 72;
                    const urgentBadge = isUrgent ? `<span class="urgency-badge">🔴 Urgent</span>` : '';

                    // Time since submitted
                    const firstReqTs = requests[0]?.ts ? new Date(requests[0].ts) : null;
                    const timeSinceStr = firstReqTs ? getTimeSince(firstReqTs) : null;
                    const timeSinceHtml = timeSinceStr ? `<div class="time-since">submitted ${timeSinceStr}</div>` : '';

                    if (isResolved) {
                        const gameNum = buildGameNum(f);
                        const resolvedMatches = [...(f['Notes']||'').matchAll(/\[RESOLVED\s*[–-]\s*([^\]]+)\]/gi)];
                        const resolvedTs = resolvedMatches.length ? resolvedMatches[resolvedMatches.length - 1][1].trim() : '';
                        return `<div class="change-card resolved" id="card_${r.id}" style="border-left-color:${clubColor};">
                            <div class="resolved-header" onclick="toggleCollapse('${r.id}')">
                                <span class="toggle-arrow">▶</span>
                                ${gameNum ? `<span class="resolved-game-num">${gameNum}</span>` : ''}
                                <span class="resolved-matchup">${f['Home Team']||'—'} vs ${f['Away Team']||'—'}</span>
                                ${resolvedTs ? `<span class="resolved-meta">${resolvedTs}</span>` : ''}
                                <span class="status-pill pill-resolved" style="font-size:0.7rem; padding:2px 10px;">✅ Resolved</span>
                            </div>
                            <div class="card-body">
                                <div class="game-meta" style="margin-bottom:10px;">${f['Date']||'—'} &nbsp;·&nbsp; ${formatTime(f['Time']||'')} &nbsp;·&nbsp; ${f['Age Group']||'—'} &nbsp;·&nbsp; ${f['Gender']||'—'}</div>
                                <div class="current-refs"><strong>Current Refs:</strong> ${refsHtml}</div>
                                ${requestHtml}
                                <div class="action-row">
                                    <button class="btn-reopen" onclick="reopenRequest('${r.id}')">↩ Re-open</button>
                                    ${contactBtn}
                                    <span class="action-msg" id="msg_${r.id}"></span>
                                </div>
                            </div>
                        </div>`;
                    }

                    return `<div class="change-card" id="card_${r.id}" style="border-left-color:${clubColor}; ${isUrgent ? 'border-left-width:5px;' : ''}">
                        <div class="change-card-header">
                            <div>
                                <div class="game-title">${f['Home Team']||'—'} vs ${f['Away Team']||'—'}</div>
                                <div class="game-meta">${f['Date']||'—'} &nbsp;·&nbsp; ${formatTime(f['Time']||'')} &nbsp;·&nbsp; ${f['Age Group']||'—'} &nbsp;·&nbsp; ${f['Gender']||'—'}</div>
                                ${timeSinceHtml}
                            </div>
                            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end;">
                                ${urgentBadge}
                                <span class="status-pill pill-open">⚠ Open</span>
                            </div>
                        </div>
                        <div class="current-refs"><strong>Current Refs:</strong> ${refsHtml}</div>
                        ${requestHtml}
                        ${noteDisplayHtml}
                        <div class="action-row">
                            <button class="btn-resolve" onclick="markResolved('${r.id}')">✅ Mark Resolved</button>
                            <button class="btn-dismiss" onclick="dismissRequest('${r.id}')">✕ Dismiss</button>
                            <a href="assignor-workstation.html?game=${r.id}" class="btn-resolve" style="background:#0f3460; text-decoration:none; display:inline-block;">📋 Open in Workstation</a>
                            ${contactBtn}
                            <span class="action-msg" id="msg_${r.id}"></span>
                        </div>
                        ${noteFormHtml}
                    </div>`;
                }).join('');

            return cards;
        }).join('');
    }

    // ── Actions ───────────────────────────────────────────────────────────────
    async function markResolved(gameId) {
        const msgEl = document.getElementById('msg_' + gameId);
        msgEl.textContent = 'Saving…'; msgEl.style.color = '#555';
        try {
            const existing = await airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.GAMES, { filterByFormula: `RECORD_ID()='${gameId}'`, maxRecords: 1 });
            const prevNotes = existing[0]?.fields['Notes'] || '';
            const now = new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
            const updatedNotes = prevNotes + `\n[RESOLVED – ${now}]`;
            await airtableClient.updateRecord(CONFIG.AIRTABLE_TABLES.GAMES, gameId, { 'Game Status': 'Change Resolved', 'Notes': updatedNotes });
            msgEl.textContent = '✅ Marked resolved';
            msgEl.style.color = '#1e8449';
            setTimeout(loadChanges, 1000);
        } catch(err) {
            msgEl.textContent = '❌ ' + err.message;
            msgEl.style.color = '#e74c3c';
        }
    }

    async function saveAssignorNote(gameId) {
        const textarea = document.getElementById('note_' + gameId);
        const msg = textarea.value.trim();
        if (!msg) return;
        const msgEl = document.getElementById('msg_' + gameId);
        msgEl.textContent = 'Saving…'; msgEl.style.color = '#555';
        try {
            const existing = await airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.GAMES, { filterByFormula: `RECORD_ID()='${gameId}'`, maxRecords: 1 });
            const prevNotes = existing[0]?.fields['Notes'] || '';
            const now = new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
            const updatedNotes = prevNotes + `\n[ASSIGNOR NOTE – ${now}] ${msg}`;
            await airtableClient.updateRecord(CONFIG.AIRTABLE_TABLES.GAMES, gameId, { 'Notes': updatedNotes });
            msgEl.textContent = '✅ Note sent';
            msgEl.style.color = '#1e8449';
            textarea.value = '';
            setTimeout(loadChanges, 800);
        } catch(err) {
            msgEl.textContent = '❌ ' + err.message;
            msgEl.style.color = '#e74c3c';
        }
    }

    async function reopenRequest(gameId) {
        if (!confirm('Re-open this change request? It will return to Open status.')) return;
        const msgEl = document.getElementById('msg_' + gameId);
        msgEl.textContent = 'Saving…'; msgEl.style.color = '#555';
        try {
            await airtableClient.updateRecord(CONFIG.AIRTABLE_TABLES.GAMES, gameId, { 'Game Status': 'Change Requested' });
            msgEl.textContent = '↩ Re-opened';
            msgEl.style.color = '#f59e0b';
            setTimeout(loadChanges, 1000);
        } catch(err) {
            msgEl.textContent = '❌ ' + err.message;
            msgEl.style.color = '#e74c3c';
        }
    }

    async function dismissRequest(gameId) {
        if (!confirm('Dismiss this change request without resolving? The game status will revert to Submitted.')) return;
        const msgEl = document.getElementById('msg_' + gameId);
        msgEl.textContent = 'Saving…'; msgEl.style.color = '#555';
        try {
            await airtableClient.updateRecord(CONFIG.AIRTABLE_TABLES.GAMES, gameId, { 'Game Status': null });
            msgEl.textContent = 'Dismissed';
            msgEl.style.color = '#888';
            setTimeout(loadChanges, 1000);
        } catch(err) {
            msgEl.textContent = '❌ ' + err.message;
            msgEl.style.color = '#e74c3c';
        }
    }

    // ── Show/hide resolved controls ───────────────────────────────────────────
    function onShowResolvedChange() {
        const btn = document.getElementById('showResolvedBtn');
        const showResolved = !btn.classList.contains('active');
        btn.classList.toggle('active', showResolved);
        document.getElementById('resolvedControls').style.display = showResolved ? 'flex' : 'none';
        document.getElementById('resolvedSummary').style.display  = showResolved ? 'flex' : 'none';
        if (!showResolved) {
            sortDir = 'desc';
            dateRange = 'all';
            clubFilter = '';
        }
        loadChanges();
    }

    window.addEventListener('load', () => {
        if (!airtableClient) { alert('Supabase client not initialized.'); return; }
        loadChanges();
        setInterval(loadChanges, 2 * 60 * 1000); // auto-refresh every 2 minutes
    });
    </script>
</body>
</html>
