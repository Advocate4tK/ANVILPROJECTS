<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Manager</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .tourney-card {
            background: white;
            border: 2px solid #d5b8f7;
            border-radius: 14px;
            padding: 28px 32px;
            margin-bottom: 22px;
            position: relative;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .tourney-card:hover { border-color: #8e44ad; box-shadow: 0 4px 18px rgba(142,68,173,0.12); }
        .tourney-card h2 { margin: 0 0 6px 0; color: #0f3460; font-size: 1.25rem; }
        .tourney-card .meta { font-size: 0.82rem; color: #888; margin-bottom: 16px; }
        .tourney-card .meta strong { color: #555; }
        .stat-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .stat-chip {
            background: #f3eaff;
            border: 1px solid #c8a0e8;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.78rem;
            color: #6c3483;
            font-weight: 600;
        }
        .badge-status {
            position: absolute;
            top: 20px;
            right: 24px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 4px 14px;
            border-radius: 20px;
        }
        .badge-completed { background: #d5f5e3; color: #1e8449; }
        .badge-pending   { background: #fef9e7; color: #7d6608; }
        .badge-active    { background: #d6eaf8; color: #1a5276; }
        .card-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            border: 2px solid transparent;
            cursor: pointer;
        }
        .action-btn.primary { background: #8e44ad; color: white; }
        .action-btn.primary:hover { background: #7d3c98; }
        .action-btn.outline { background: white; color: #8e44ad; border-color: #c8a0e8; }
        .action-btn.outline:hover { border-color: #8e44ad; }
        .empty-state {
            text-align: center;
            padding: 50px 30px;
            color: #aaa;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .loading-msg { text-align: center; color: #888; font-size: 0.9rem; padding: 30px; }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-header h2 { color: #6c3483; font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 Tournament Manager</h1>
            <p class="subtitle">ANVIL Referee Tool — Tournament Module</p>
        </header>

        <main>
            <div style="margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <a href="admin.html" class="btn btn-outline" style="font-size:0.85rem; padding:8px 16px;">← Admin Portal</a>
                <a href="seed-tournament.html" class="action-btn primary" style="font-size:0.85rem; padding:8px 18px;">⬆️ Import Tournament from CSV</a>
            </div>

            <!-- Active / Upcoming -->
            <div class="section-header">
                <h2>📋 Tournaments</h2>
            </div>

            <div id="tourneyList">
                <div class="loading-msg">Loading tournaments...</div>
            </div>

        </main>

        <footer>
            <p style="display:flex;align-items:center;justify-content:center;gap:10px;">&copy; 2026 Referee Scheduling System by <a href="mailto:tod@anvil-arts.com" style="color:#d4845a;font-weight:700;text-decoration:none;">Anvil Arts</a> <img src="PICS/anvil.png" height="28" style="opacity:0.75;" title="Built by Ralph E. Smith / Anvil Arts"></p>
        </footer>
    </div>

    <script src="js/admin-auth.js"></script>
    <script>checkAdminAccess();</script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js?v=9"></script>
    <script>

    async function loadTournaments() {
        const db = supabaseClient ? supabaseClient.client : null;
        if (!db) {
            document.getElementById('tourneyList').innerHTML =
                '<div class="loading-msg" style="color:#c0392b;">Database not connected.</div>';
            return;
        }

        // Query games table for all Tournament games
        const { data, error } = await db
            .from('games')
            .select('id, date, "Source Club", "Age Group", division, game_type')
            .eq('game_type', 'Tournament')
            .order('date', { ascending: true });

        if (error) {
            document.getElementById('tourneyList').innerHTML =
                `<div class="loading-msg" style="color:#c0392b;">Error: ${error.message}</div>`;
            return;
        }

        if (!data || !data.length) {
            document.getElementById('tourneyList').innerHTML = `
                <div class="tourney-card">
                    <div class="empty-state">
                        <div class="icon">🏟️</div>
                        <p style="font-size:1rem; color:#555; font-weight:600;">No tournaments in the system yet.</p>
                        <p style="font-size:0.88rem; margin-bottom:22px;">Import the 2025 Glastonbury Spring Warmup to get started.</p>
                        <a href="seed-tournament.html" class="action-btn primary">⬆️ Import 2025 Glastonbury CSV</a>
                    </div>
                </div>`;
            return;
        }

        // Group by Source Club + year range
        const grouped = {};
        data.forEach(g => {
            const club = g['Source Club'] || 'Unknown';
            const year = (g.date || '').slice(0, 4);
            const key = `${club}_${year}`;
            if (!grouped[key]) grouped[key] = { club, year, games: [], dates: [] };
            grouped[key].games.push(g);
            if (g.date) grouped[key].dates.push(g.date);
        });

        const list = document.getElementById('tourneyList');
        list.innerHTML = '';

        Object.values(grouped).sort((a, b) => b.year - a.year).forEach(t => {
            const dates = [...new Set(t.dates)].sort();
            const firstDate = dates[0] || '';
            const lastDate  = dates[dates.length - 1] || '';
            const today = new Date().toISOString().slice(0, 10);
            let status, statusLabel;
            if (lastDate < today)        { status = 'completed'; statusLabel = 'Completed'; }
            else if (firstDate <= today) { status = 'active';    statusLabel = 'In Progress'; }
            else                         { status = 'pending';   statusLabel = 'Upcoming'; }

            const ageGroups = [...new Set(t.games.map(g => g['Age Group']).filter(Boolean))].sort();
            const fmtDate = d => {
                if (!d) return '?';
                const [y, m, day] = d.split('-');
                return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]} ${parseInt(day)}, ${y}`;
            };
            const dateRange = dates.length > 1
                ? `${fmtDate(firstDate)} – ${fmtDate(lastDate)}`
                : fmtDate(firstDate);

            const card = document.createElement('div');
            card.className = 'tourney-card';
            card.innerHTML = `
                <span class="badge-status badge-${status}">${statusLabel}</span>
                <h2>🏆 ${t.club} Spring Warmup ${t.year}</h2>
                <div class="meta"><strong>${dateRange}</strong> &nbsp;·&nbsp; ${dates.length} day${dates.length !== 1 ? 's' : ''}</div>
                <div class="stat-row">
                    <span class="stat-chip">${t.games.length} Games</span>
                    ${ageGroups.slice(0, 6).map(a => `<span class="stat-chip">${a}</span>`).join('')}
                    ${ageGroups.length > 6 ? `<span class="stat-chip">+${ageGroups.length - 6} more</span>` : ''}
                </div>
                <div class="card-actions">
                    <a href="tournament-workstation.html?club=${encodeURIComponent(t.club)}&year=${t.year}" class="action-btn primary">📋 Open in Workstation</a>
                    <a href="seed-tournament.html" class="action-btn outline">⬆️ Re-import / Update</a>
                </div>`;
            list.appendChild(card);
        });
    }

    loadTournaments();

    </script>
</body>
</html>
