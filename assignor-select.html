<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Assignor Workstation</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20;
            background-image: repeating-linear-gradient(15deg, transparent, transparent 56px, rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px);
            color: #e8eef7; font-family: 'DM Sans', system-ui, sans-serif; margin: 0; min-height: 100vh;
        }
        .wrap { max-width: 920px; margin: 0 auto; padding: 40px 20px 80px; }
        .back { color: #00c853; text-decoration: none; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        h1 { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: #fff; font-size: 2.4rem; margin: 24px 0 4px; }
        .sub { color: #8aa0bf; margin: 0 0 36px; font-size: 1.05rem; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { display: block; text-decoration: none; background: #0c1730; border: 1px solid #1d3354; border-radius: 16px; padding: 34px 24px; text-align: center; transition: transform .15s, border-color .15s, box-shadow .15s; }
        .card:hover { border-color: #00c853; transform: translateY(-3px); box-shadow: 0 8px 28px rgba(0,200,83,0.15); }
        .icon { font-size: 3rem; display: block; margin-bottom: 14px; }
        .ctitle { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 1.55rem; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        .cdesc { color: #8aa0bf; font-size: 0.9rem; margin-top: 8px; line-height: 1.5; }
        .go { display: inline-block; margin-top: 18px; background: #00c853; color: #062e16; font-weight: 800; padding: 9px 24px; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="wrap">
        <a href="admin.html" class="back">← Dashboard</a>
        <h1>Assignor Workstation</h1>
        <p class="sub">Which one are you assigning today?</p>
        <div class="cards">
            <a class="card" href="assignor-workstation.html">
                <span class="icon">🏟️</span>
                <div class="ctitle">Clubs</div>
                <div class="cdesc">Regular club season — weekly games by club.</div>
                <span class="go">Open →</span>
            </a>
            <a class="card" href="event-assignor-workstation.html">
                <span class="icon">📅</span>
                <div class="ctitle">Events</div>
                <div class="cdesc">Leagues &amp; events like Girls Summer League.</div>
                <span class="go">Open →</span>
            </a>
            <a class="card" href="tournament.html">
                <span class="icon">🏆</span>
                <div class="ctitle">Tournaments</div>
                <div class="cdesc">Bracket play &amp; compressed tournament scheduling.</div>
                <span class="go">Open →</span>
            </a>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>checkAdminAccess();</script>
</body>
</html>
