<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Workstation</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ── Tournament Header ─────────────────────────────────────────── */
        .tw-header {
            display: flex;
            align-items: center;
            gap: 18px;
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            border-radius: 14px;
            padding: 18px 24px;
            margin-bottom: 20px;
            color: white;
        }
        .tw-header img { height: 72px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); }
        .tw-header h1 { margin: 0; font-size: 1.5rem; color: white; }
        .tw-header .tw-meta { font-size: 0.82rem; color: #a0b4cc; margin-top: 4px; }

        /* ── Day Tabs ──────────────────────────────────────────────────── */
        .day-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .day-tab {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.88rem;
            cursor: pointer;
            border: 2px solid #d0d7e2;
            background: #f5f7fa;
            color: #555;
            transition: all 0.15s;
            user-select: none;
        }
        .day-tab:hover { border-color: #8e44ad; color: #8e44ad; }
        .day-tab.active { background: #8e44ad; color: white; border-color: #8e44ad; }
        .day-tab .tab-date { display: block; font-size: 0.72rem; font-weight: 400; margin-top: 2px; opacity: 0.8; }
        .day-tab .tab-count { display: block; font-size: 0.7rem; margin-top: 2px; opacity: 0.7; }

        /* ── Two-pane layout ───────────────────────────────────────────── */
        .tw-layout {
            display: grid;
            grid-template-columns: 1fr 290px;
            gap: 16px;
            align-items: start;
        }

        /* ── Games Pane ────────────────────────────────────────────────── */
        .tw-games {
            background: white;
            border-radius: 12px;
            padding: 0 18px 20px 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border-top: 4px solid #8e44ad;
            min-height: 400px;
        }
        .time-block-header {
            position: sticky;
            top: 0;
            background: white;
            z-index: 5;
            padding: 14px 0 8px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .time-block-header h3 {
            margin: 0;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8e44ad;
        }
        .time-block-divider { flex: 1; height: 1px; background: #e8d5f5; }
        .time-block-count { font-size: 0.72rem; color: #aaa; }

        .game-card {
            border: 2px solid #e8d5f5;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 8px;
            transition: border-color 0.15s;
            background: white;
        }
        .game-card:hover { border-color: #8e44ad; }
        .game-card.drag-over { border-color: #27ae60; background: #f0fff4; }
        .game-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .game-time { font-weight: 700; font-size: 0.88rem; color: #1a1a2e; min-width: 55px; }
        .game-div  { font-size: 0.72rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
        .game-div-B { background: #d6eaf8; color: #1a5276; }
        .game-div-G { background: #fce4ec; color: #880e4f; }
        .game-teams { font-size: 0.82rem; color: #555; }
        .game-field { font-size: 0.7rem; color: #aaa; margin-left: auto; }

        .assign-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .assign-slot {
            border: 1.5px dashed #c8a0e8;
            border-radius: 7px;
            padding: 5px 8px;
            font-size: 0.74rem;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #faf5ff;
            cursor: default;
            transition: background 0.15s, border-color 0.15s;
        }
        .assign-slot.filled { border-style: solid; border-color: #8e44ad; background: #f3eaff; cursor: grab; }
        .assign-slot.filled:active { cursor: grabbing; }
        .assign-slot:hover.filled { background: #ead5ff; }
        .assign-slot .pos-label { font-size: 0.65rem; color: #aaa; font-weight: 700; margin-right: 4px; white-space: nowrap; }
        .assign-slot .ref-name  { font-size: 0.74rem; color: #4a235a; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .assign-slot .clear-x  { font-size: 0.7rem; color: #c0a0d0; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
        .assign-slot .clear-x:hover { color: #c0392b; }
        .assign-slot.drag-over-slot { border-color: #27ae60; background: #f0fff4; }

        /* ── Ref Pane ──────────────────────────────────────────────────── */
        .tw-refs {
            background: white;
            border-radius: 12px;
            padding: 14px 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border-top: 4px solid #8e44ad;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
        }
        .tw-refs h3 { margin: 0 0 10px 0; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px; color: #8e44ad; }

        /* ── Ref availability grid ─────────────────────────────────────── */
        .avail-grid { width: 100%; border-collapse: collapse; font-size: 0.72rem; }
        .avail-grid th {
            padding: 4px 3px;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #e8d5f5;
        }
        .avail-grid th.day-header { color: #6c3483; border-bottom: none; }
        .avail-grid td {
            padding: 4px 3px;
            text-align: center;
            border-bottom: 1px solid #f0e8fb;
        }
        .avail-grid tr:hover td { background: #faf5ff; }
        .avail-grid tr.active-ref td { background: #f3eaff; }
        .ref-name-cell {
            text-align: left !important;
            font-weight: 600;
            color: #1a1a2e;
            font-size: 0.73rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 90px;
            cursor: grab;
            padding-left: 4px !important;
        }
        .ref-name-cell:active { cursor: grabbing; }
        .avail-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }
        .dot-avail   { background: #27ae60; }
        .dot-partial { background: #f39c12; }
        .dot-none    { background: #e0e0e0; }
        .dot-unknown { background: #e8e8e8; border: 1px dashed #ccc; }

        .avail-legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid #f0e8fb;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 0.65rem; color: #888; }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

        /* ── Search ────────────────────────────────────────────────────── */
        .ref-search {
            width: 100%;
            padding: 6px 10px;
            border: 1.5px solid #d0b3f0;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 8px;
            outline: none;
            box-sizing: border-box;
        }
        .ref-search:focus { border-color: #8e44ad; }

        /* ── Status bar ────────────────────────────────────────────────── */
        .status-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            background: #f3eaff;
            border-radius: 10px;
            padding: 8px 14px;
            margin-bottom: 14px;
            font-size: 0.8rem;
        }
        .status-bar .stat { color: #6c3483; }
        .status-bar .stat strong { font-weight: 700; }
        .status-bar .sep { color: #c8a0e8; }
        #saveStatus { font-size: 0.75rem; color: #888; margin-left: auto; }
    </style>
</head>
<body>
    <div class="container">

        <!-- Tournament Header -->
        <div class="tw-header">
            <img src="PICS/Glast.png" alt="Glastonbury Spring Warmup">
            <div>
                <h1 id="twTitle">Glastonbury Spring Warmup 2025</h1>
                <div class="tw-meta" id="twMeta">April 25–27, 2025 &nbsp;·&nbsp; Tournament Workstation</div>
            </div>
            <div style="margin-left:auto; display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
                <a href="tournament.html" style="color:#a0b4cc; font-size:0.8rem; text-decoration:none;">← Tournaments</a>
                <a href="admin.html"      style="color:#a0b4cc; font-size:0.8rem; text-decoration:none;">Admin Portal</a>
            </div>
        </div>

        <!-- Day Tabs -->
        <div class="day-tabs" id="dayTabs"></div>

        <!-- Status bar -->
        <div class="status-bar" id="statusBar">
            <span class="stat"><strong id="statAssigned">0</strong> assigned</span>
            <span class="sep">·</span>
            <span class="stat"><strong id="statOpen">0</strong> open slots</span>
            <span class="sep">·</span>
            <span class="stat"><strong id="statGames">0</strong> games today</span>
            <span id="saveStatus">Loading...</span>
        </div>

        <!-- Two-pane layout -->
        <div class="tw-layout">

            <!-- Games pane -->
            <div class="tw-games" id="gamesPane">
                <div style="padding:40px; text-align:center; color:#aaa;">Loading games...</div>
            </div>

            <!-- Ref pane -->
            <div class="tw-refs">
                <h3>Referees</h3>
                <input type="text" class="ref-search" id="refSearch" placeholder="Search refs..." oninput="filterRefs()">
                <div id="refGridWrap">
                    <div style="text-align:center; color:#aaa; padding:20px;">Loading refs...</div>
                </div>
                <div class="avail-legend">
                    <div class="legend-item"><div class="legend-dot dot-avail"></div> Available</div>
                    <div class="legend-item"><div class="legend-dot dot-none" style="border:1px solid #ccc;"></div> Unavailable</div>
                    <div class="legend-item"><div class="legend-dot dot-unknown"></div> Unknown</div>
                </div>
            </div>

        </div>

    </div>

    <script src="js/admin-auth.js"></script>
    <script>checkAdminAccess();</script>
    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/supabase-client.js?v=9"></script>
    <script>

    // ── Tournament config ─────────────────────────────────────────────────
    // Eventually driven by URL param: ?id=glastonbury-2025
    const TOURNAMENT = {
        label:      'Glastonbury Spring Warmup 2025',
        sourceClub: 'Glastonbury',
        days: [
            { key: 'fri', label: 'Friday',   date: '2025-04-25', display: 'Apr 25' },
            { key: 'sat', label: 'Saturday',  date: '2025-04-26', display: 'Apr 26' },
            { key: 'sun', label: 'Sunday',    date: '2025-04-27', display: 'Apr 27' },
        ]
    };

    // ── State ─────────────────────────────────────────────────────────────
    let allGames    = [];  // all tournament games (raw from DB)
    let allRefs     = [];  // all active referees
    let allAvail    = [];  // availability records for tournament dates
    let activeDay   = 'fri';
    let dragRefName = null;
    const db        = () => supabaseClient ? supabaseClient.client : null;

    // availability map: date → refNameLower → { am: bool, pm: bool }
    let availMap = {};

    // ── Boot ──────────────────────────────────────────────────────────────
    async function boot() {
        buildDayTabs();
        await Promise.all([loadGames(), loadRefs(), loadAvail()]);
        buildAvailMap();
        renderRefGrid();
        renderGamesPane();
        updateStatus();
        document.getElementById('saveStatus').textContent = 'Ready';
    }

    // ── Day Tabs ──────────────────────────────────────────────────────────
    function buildDayTabs() {
        const wrap = document.getElementById('dayTabs');
        TOURNAMENT.days.forEach(d => {
            const tab = document.createElement('div');
            tab.className = 'day-tab' + (d.key === activeDay ? ' active' : '');
            tab.id = `tab-${d.key}`;
            tab.innerHTML = `${d.label}<span class="tab-date">${d.display}, 2025</span><span class="tab-count" id="tabcount-${d.key}"></span>`;
            tab.onclick = () => switchDay(d.key);
            wrap.appendChild(tab);
        });
    }

    function switchDay(key) {
        activeDay = key;
        document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`tab-${key}`).classList.add('active');
        renderGamesPane();
        updateStatus();
    }

    // ── Data loading ──────────────────────────────────────────────────────
    async function loadGames() {
        const { data, error } = await db()
            .from('games')
            .select('*')
            .eq('game_type', 'Tournament')
            .eq('"Source Club"', 'Glastonbury')
            .in('date', TOURNAMENT.days.map(d => d.date))
            .order('date')
            .order('time');
        if (error) { console.error('Games load error:', error.message); return; }
        allGames = data || [];

        // Update tab counts
        TOURNAMENT.days.forEach(d => {
            const count = allGames.filter(g => g.date === d.date).length;
            const el = document.getElementById(`tabcount-${d.key}`);
            if (el) el.textContent = `${count} games`;
        });
    }

    async function loadRefs() {
        const { data, error } = await db()
            .from('referees')
            .select('id, name, "Certification Level", "Years Reffing", "Central Assign Name"')
            .eq('status', 'Active')
            .order('name');
        if (error) { console.error('Refs load error:', error.message); return; }
        allRefs = data || [];
    }

    async function loadAvail() {
        const dates = TOURNAMENT.days.map(d => d.date);
        const { data, error } = await db()
            .from('availability')
            .select('"Referee Name", date, "Start Time", "End Time"')
            .in('date', dates);
        if (error) { console.error('Avail load error:', error.message); return; }
        allAvail = data || [];
    }

    function buildAvailMap() {
        availMap = {};
        allAvail.forEach(a => {
            const name = (a['Referee Name'] || '').trim().toLowerCase();
            const date = a.date;
            if (!name || !date) return;
            if (!availMap[date]) availMap[date] = {};
            const startH = timeToHour(a['Start Time'] || '');
            const endH   = timeToHour(a['End Time']   || '');
            const am = startH !== null && startH < 12;
            const pm = endH   !== null && endH   >= 12;
            if (!availMap[date][name]) availMap[date][name] = { am: false, pm: false };
            if (am) availMap[date][name].am = true;
            if (pm) availMap[date][name].pm = true;
        });
    }

    function timeToHour(t) {
        // "08:00:00" or "08:00" → 8
        if (!t) return null;
        const parts = t.split(':');
        return parseInt(parts[0], 10);
    }

    // ── Ref Grid ──────────────────────────────────────────────────────────
    function renderRefGrid(filter) {
        const refs = filter
            ? allRefs.filter(r => (r.name || '').toLowerCase().includes(filter.toLowerCase()))
            : allRefs;

        const days = TOURNAMENT.days;
        let html = `<table class="avail-grid">
            <thead>
                <tr>
                    <th style="text-align:left;" rowspan="2">Name</th>
                    ${days.map(d => `<th class="day-header" colspan="2">${d.key.charAt(0).toUpperCase() + d.key.slice(1)}</th>`).join('')}
                </tr>
                <tr>
                    ${days.map(() => `<th>AM</th><th>PM</th>`).join('')}
                </tr>
            </thead>
            <tbody>`;

        refs.forEach(ref => {
            const nameLc = (ref.name || '').trim().toLowerCase();
            html += `<tr>
                <td class="ref-name-cell"
                    draggable="true"
                    ondragstart="refDragStart(event, '${(ref.name||'').replace(/'/g,"\\'")}')">
                    ${escHtml(ref.name || '')}
                </td>`;

            days.forEach(d => {
                const dayAvail = availMap[d.date] || {};
                const refAvail = dayAvail[nameLc];
                if (refAvail) {
                    html += `<td>${dot(refAvail.am)}</td><td>${dot(refAvail.pm)}</td>`;
                } else if (allAvail.length === 0 || !Object.keys(dayAvail).length) {
                    // No availability data at all for this tournament (historical — 2025)
                    html += `<td><span class="avail-dot dot-unknown"></span></td>
                             <td><span class="avail-dot dot-unknown"></span></td>`;
                } else {
                    // Has data for this day but ref didn't submit
                    html += `<td><span class="avail-dot dot-none"></span></td>
                             <td><span class="avail-dot dot-none"></span></td>`;
                }
            });

            html += `</tr>`;
        });

        html += `</tbody></table>`;
        document.getElementById('refGridWrap').innerHTML = html;
    }

    function dot(avail) {
        return `<span class="avail-dot ${avail ? 'dot-avail' : 'dot-none'}"></span>`;
    }

    function filterRefs() {
        const q = document.getElementById('refSearch').value.trim();
        renderRefGrid(q || null);
    }

    // ── Games Pane ────────────────────────────────────────────────────────
    function renderGamesPane() {
        const dayObj  = TOURNAMENT.days.find(d => d.key === activeDay);
        const dayGames = allGames.filter(g => g.date === dayObj.date);

        const amGames = dayGames.filter(g => timeToHour(g.time) !== null && timeToHour(g.time) < 12);
        const pmGames = dayGames.filter(g => timeToHour(g.time) !== null && timeToHour(g.time) >= 12);
        const unknGames = dayGames.filter(g => timeToHour(g.time) === null);

        let html = '';
        if (!dayGames.length) {
            html = `<div style="text-align:center; color:#aaa; padding:60px 0;">No games for this day.</div>`;
        } else {
            html += buildBlock('Morning Games', amGames);
            html += buildBlock('Afternoon Games', pmGames);
            if (unknGames.length) html += buildBlock('Unknown Time', unknGames);
        }

        document.getElementById('gamesPane').innerHTML = html;
        reattachDropZones();
    }

    function buildBlock(label, games) {
        if (!games.length) return '';
        let html = `<div class="time-block-header">
            <h3>${label}</h3>
            <div class="time-block-divider"></div>
            <span class="time-block-count">${games.length} games</span>
        </div>`;
        games.forEach(g => { html += buildGameCard(g); });
        return html;
    }

    function buildGameCard(g) {
        const gid     = g.id;
        const timeStr = fmtTime(g.time);
        const div     = (g.division || '').trim();
        const age     = g['Age Group'] || '';
        const home    = g['Home Team'] || '—';
        const away    = g['Away Team'] || '—';
        const fieldId = g['Field ID'] ? `Field ${g['Field ID']}` : '';
        const gameId  = g['GAME ID'] ? `#${g['GAME ID']}` : '';

        const isBoys  = div.endsWith('B');
        const isGirls = div.endsWith('G');
        const divCls  = isBoys ? 'game-div-B' : isGirls ? 'game-div-G' : '';

        const crName  = g['Center Referee'] || '';
        const ar1Name = g['AR 1'] || '';
        const ar2Name = g['AR 2'] || '';

        return `<div class="game-card" id="gc-${gid}"
                    ondragover="gameDragOver(event, ${gid})"
                    ondragleave="gameDragLeave(event, ${gid})"
                    ondrop="gameDrop(event, ${gid})">
            <div class="game-meta">
                <span class="game-time">${timeStr}</span>
                ${div ? `<span class="game-div ${divCls}">${div}</span>` : ''}
                <span class="game-teams">${escHtml(home)} vs ${escHtml(away)}</span>
                <span class="game-field">${fieldId}${gameId ? ' &nbsp;' + gameId : ''}</span>
            </div>
            <div class="assign-row">
                ${buildSlot(gid, 'Center Referee', 'CR', crName)}
                ${buildSlot(gid, 'AR 1', 'AR1', ar1Name)}
                ${buildSlot(gid, 'AR 2', 'AR2', ar2Name)}
            </div>
        </div>`;
    }

    function buildSlot(gid, field, label, name) {
        const safeField = field.replace(/\s/g, '_');
        const filled    = !!name && name !== '—';
        const safeName  = (name || '').replace(/'/g, "\\'");
        return `<div class="assign-slot${filled ? ' filled' : ''}"
                    id="slot-${gid}-${safeField}"
                    ondragover="slotDragOver(event)"
                    ondragleave="slotDragLeave(event)"
                    ondrop="slotDrop(event, ${gid}, '${field}')"
                    ${filled ? `draggable="true" ondragstart="slotDragStart(event, ${gid}, '${field}', '${safeName}')"` : ''}>
            <span class="pos-label">${label}</span>
            <span class="ref-name">${filled ? escHtml(name) : ''}</span>
            ${filled ? `<span class="clear-x" onclick="clearSlot(${gid}, '${field}')">✕</span>` : ''}
        </div>`;
    }

    function reattachDropZones() {
        // All drop handling done inline via HTML attributes — no extra JS needed
    }

    // ── Drag from ref grid ────────────────────────────────────────────────
    function refDragStart(e, name) {
        dragRefName = name;
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('text/plain', name);
    }

    // ── Drag from assigned slot ───────────────────────────────────────────
    let slotDragData = null;
    function slotDragStart(e, gid, field, name) {
        slotDragData = { gid, field, name };
        dragRefName  = name;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', name);
    }

    function gameDragOver(e, gid) {
        e.preventDefault();
        document.getElementById(`gc-${gid}`)?.classList.add('drag-over');
    }
    function gameDragLeave(e, gid) {
        if (!e.currentTarget.contains(e.relatedTarget))
            document.getElementById(`gc-${gid}`)?.classList.remove('drag-over');
    }
    function gameDrop(e, gid) {
        e.preventDefault();
        document.getElementById(`gc-${gid}`)?.classList.remove('drag-over');
        // If dropped on game card (not a slot), assign as Center if empty
        const game = allGames.find(g => g.id === gid);
        if (!game) return;
        if (!game['Center Referee']) {
            assignRef(gid, 'Center Referee', dragRefName);
        }
    }

    function slotDragOver(e) {
        e.preventDefault();
        e.currentTarget.classList.add('drag-over-slot');
    }
    function slotDragLeave(e) {
        e.currentTarget.classList.remove('drag-over-slot');
    }
    function slotDrop(e, gid, field) {
        e.preventDefault();
        e.stopPropagation();
        e.currentTarget.classList.remove('drag-over-slot');
        if (!dragRefName) return;

        const wasFromSlot = slotDragData && slotDragData.gid === gid && slotDragData.field === field;
        if (wasFromSlot) { slotDragData = null; dragRefName = null; return; }

        // If dragged from another slot — clear it first
        if (slotDragData) {
            clearSlotLocal(slotDragData.gid, slotDragData.field);
            slotDragData = null;
        }

        assignRef(gid, field, dragRefName);
        dragRefName = null;
    }

    // ── Assignment save ───────────────────────────────────────────────────
    async function assignRef(gid, field, name) {
        if (!name) return;
        setSaveStatus('Saving...');

        // Update local state
        const game = allGames.find(g => g.id === gid);
        if (game) game[field] = name;

        // Update slot UI
        refreshSlot(gid, field, name);
        updateStatus();

        // Save to DB
        try {
            const update = {};
            update[field] = name;
            const { error } = await db().from('games').update(update).eq('id', gid);
            if (error) throw error;
            setSaveStatus('Saved ✓');
        } catch (err) {
            console.error('Save error:', err.message);
            setSaveStatus('Save failed — ' + err.message);
        }
    }

    async function clearSlot(gid, field) {
        clearSlotLocal(gid, field);
        setSaveStatus('Saving...');
        try {
            const update = {};
            update[field] = null;
            const { error } = await db().from('games').update(update).eq('id', gid);
            if (error) throw error;
            setSaveStatus('Saved ✓');
        } catch (err) {
            setSaveStatus('Save failed — ' + err.message);
        }
    }

    function clearSlotLocal(gid, field) {
        const game = allGames.find(g => g.id === gid);
        if (game) game[field] = null;
        refreshSlot(gid, field, null);
        updateStatus();
    }

    function refreshSlot(gid, field, name) {
        const safeField = field.replace(/\s/g, '_');
        const el = document.getElementById(`slot-${gid}-${safeField}`);
        if (!el) return;
        const filled = !!name;
        const safeName = (name || '').replace(/'/g, "\\'");
        const labels = { 'Center Referee': 'CR', 'AR 1': 'AR1', 'AR 2': 'AR2' };
        const label  = labels[field] || field;
        el.className = 'assign-slot' + (filled ? ' filled' : '');
        el.innerHTML = `<span class="pos-label">${label}</span>
            <span class="ref-name">${filled ? escHtml(name) : ''}</span>
            ${filled ? `<span class="clear-x" onclick="clearSlot(${gid}, '${field}')">✕</span>` : ''}`;
        if (filled) {
            el.setAttribute('draggable', 'true');
            el.setAttribute('ondragstart', `slotDragStart(event, ${gid}, '${field}', '${safeName}')`);
        } else {
            el.removeAttribute('draggable');
            el.removeAttribute('ondragstart');
        }
    }

    // ── Status bar ────────────────────────────────────────────────────────
    function updateStatus() {
        const dayObj   = TOURNAMENT.days.find(d => d.key === activeDay);
        const dayGames = allGames.filter(g => g.date === dayObj.date);
        const positions = ['Center Referee', 'AR 1', 'AR 2'];
        let assigned = 0, open = 0;
        dayGames.forEach(g => {
            positions.forEach(p => {
                if (g[p] && g[p] !== '—') assigned++;
                else open++;
            });
        });
        document.getElementById('statAssigned').textContent = assigned;
        document.getElementById('statOpen').textContent     = open;
        document.getElementById('statGames').textContent    = dayGames.length;
    }

    function setSaveStatus(msg) {
        const el = document.getElementById('saveStatus');
        if (el) el.textContent = msg;
        if (msg === 'Saved ✓') setTimeout(() => { if (el) el.textContent = ''; }, 2000);
    }

    // ── Utils ─────────────────────────────────────────────────────────────
    function fmtTime(t) {
        if (!t) return '—';
        const [h, m] = t.split(':');
        const hour = parseInt(h, 10);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const h12  = hour % 12 || 12;
        return `${h12}:${m} ${ampm}`;
    }

    function escHtml(str) {
        return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Go ────────────────────────────────────────────────────────────────
    boot();

    </script>
</body>
