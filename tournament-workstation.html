<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tournament Workstation</title>
    <script>
        // Redirect to the assignor workstation in tournament mode
        // Passes club and year from URL params, maps to tournament key
        const p = new URLSearchParams(window.location.search);
        const club = (p.get('club') || 'glastonbury').toLowerCase();
        const year = p.get('year') || '2025';
        const key  = `${club}-${year}`;
        window.location.replace(`assignor-workstation.html?tournament=${key}`);
    </script>
</head>
<body></body>
</html>
