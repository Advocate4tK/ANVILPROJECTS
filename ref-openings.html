<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Game Slots — Referee Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <style>

        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg,
                transparent,
                transparent 56px,
                rgba(255,255,255,0.016) 56px,
                rgba(255,255,255,0.016) 58px
            ) !important;
            font-family: 'DM Sans', sans-serif;
        }

        .page-wrap {
            max-width: 820px;
            margin: 0 auto;
            padding: 36px 20px 60px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .header-text { flex: 1; }

        .eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--accent, #00c853);
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.4rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 0.95;
            margin: 0 0 10px;
        }

        .page-title .line2 { color: var(--accent, #00c853); }

        .page-sub {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.45);
            line-height: 1.5;
        }

        /* ── Logo mark ── */
        .logo-mark {
            --sz: 120px;
            position: relative;
            width:  var(--sz);
            height: var(--sz);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lcard {
            position: absolute;
            border-radius: calc(var(--sz) * 0.065);
        }
        .lcard-red {
            width:  calc(var(--sz) * 0.58);
            height: calc(var(--sz) * 0.82);
            background: linear-gradient(145deg, #f87171 0%, #ef4444 55%, #b91c1c 100%);
            box-shadow: 0 calc(var(--sz)*0.02) calc(var(--sz)*0.12) rgba(239,68,68,0.45);
            top:  calc(var(--sz) * 0.21);
            left: calc(var(--sz) * 0.32);
            transform: rotate(22deg);
        }
        .lcard-yellow {
            width:  calc(var(--sz) * 0.64);
            height: calc(var(--sz) * 0.88);
            background: linear-gradient(145deg, #fde047 0%, #f59e0b 55%, #b45309 100%);
            box-shadow:
                0 0 calc(var(--sz)*0.2)  rgba(245,158,11,0.6),
                0 0 calc(var(--sz)*0.4)  rgba(245,158,11,0.2),
                0 calc(var(--sz)*0.05) calc(var(--sz)*0.18) rgba(0,0,0,0.5);
            top:  calc(var(--sz) * 0.12);
            left: calc(var(--sz) * 0.18);
            transform: rotate(10deg);
        }
        .logo-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: calc(var(--sz) * 0.10);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            z-index: 10;
            line-height: 0.88;
            letter-spacing: 2px;
        }
        .logo-line1 {
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.7);
            font-size: calc(var(--sz) * 0.2);
        }
        .logo-line2 {
            color: #00c853;
            text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 28px rgba(0,200,83,0.5);
            font-size: calc(var(--sz) * 0.26);
            margin-top: calc(var(--sz) * -0.01);
            transform: skewX(-14deg);
            display: block;
        }
        .logo-underline {
            display: block;
            height: calc(var(--sz) * 0.022);
            width:  calc(var(--sz) * 0.58);
            margin-top: calc(var(--sz) * 0.025);
            background: #ef4444;
            border-radius: calc(var(--sz) * 0.01);
            box-shadow:
                0 0 calc(var(--sz)*0.012) #ef4444,
                0 0 calc(var(--sz)*0.04)  rgba(239,68,68,0.85),
                0 0 calc(var(--sz)*0.08)  rgba(239,68,68,0.5);
            transform: skewX(-14deg);
        }

        /* ── Status bar ── */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 8px 16px;
            margin-bottom: 24px;
            font-size: 0.78rem;
        }
        .status-count {
            color: #fff;
            font-weight: 700;
        }
        .status-count span {
            color: var(--accent, #00c853);
        }
        .status-updated {
            color: rgba(255,255,255,0.4);
        }
        .refresh-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent, #00c853);
            margin-right: 6px;
            animation: blink 2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        /* ── Filter bar ── */
        .filter-bar {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            align-items: stretch;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 8px 16px;
        }
        .filter-group {
            display: flex;
            gap: 4px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 4px;
            align-items: center;
            flex-shrink: 0;
        }
        .filter-btn {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 7px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            color: rgba(255,255,255,0.5);
            transition: all 0.15s;
            white-space: nowrap;
        }
        .filter-btn:hover  { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.08); }
        .filter-btn.active { background: #fff; color: #0f1e3c; }

        /* ── Club rotator selector ── */
        .club-selector {
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 6px 16px;
            cursor: pointer;
            flex: 1;
            min-width: 0;
            transition: border-color 0.2s, background 0.2s;
        }
        .club-selector:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.22);
        }
        .club-selector.has-selection {
            border-color: #00c853;
            background: rgba(0,200,83,0.08);
        }
        .club-selector-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .club-rotator-wrap {
            flex: 1;
            overflow: hidden;
            height: 36px;
            position: relative;
            min-width: 0;
        }
        .club-rotator-name {
            position: absolute;
            top: 0; left: 0; right: 0;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 36px;
            color: #ffe000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: opacity 0.4s, transform 0.4s;
        }
        .club-rotator-name.fade-out {
            opacity: 0;
            transform: translateY(-8px);
        }
        .club-rotator-name.fade-in {
            opacity: 0;
            transform: translateY(8px);
        }
        .club-selector-arrow {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }
        .club-selector.has-selection .club-rotator-name { color: #00c853; }
        .club-selector.has-selection .club-selector-label { color: rgba(0,200,83,0.6); }

        /* hidden native select — positioned over the whole box for click handling */
        .club-selector select {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 16px; /* prevents iOS zoom */
            width: 100%;
            height: 100%;
        }

        /* ── Date divider ── */
        .date-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 8px;
        }
        .date-divider-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
        }
        .date-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.12);
        }

        /* ── Game card ── */
        .game-card {
            background: #fff;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .game-card-header {
            padding: 10px 14px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            cursor: pointer;
            user-select: none;
        }
        .game-card-header:hover { background: #f8f9fb; }

        .game-card-body {
            display: none;
            border-top: 1px solid #eee;
        }
        .game-card.open .game-card-body { display: block; }

        .game-chevron {
            font-size: 0.65rem;
            color: #00c853;
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-right: 4px;
        }
        .game-card.open .game-chevron { transform: rotate(90deg); }

        .badge-open { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

        .game-teams {
            font-size: 0.9rem;
            font-weight: 700;
            color: #0f1e3c;
            flex: 1;
            min-width: 0;
        }

        .game-meta-line {
            font-size: 0.75rem;
            color: #667;
            flex-shrink: 0;
        }

        .badge {
            font-size: 0.62rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 4px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .badge-age  { background: #e8eef7; color: #1a3a6b; }
        .badge-gri  { background: #1e3a5f; color: #7eb8f7; }
        .badge-eh   { background: #1e5f3e; color: #6ee7b7; }
        .badge-rhm  { background: #3e1e5f; color: #d8b4fe; }
        .badge-leb  { background: #5f3e1e; color: #fcd34d; }
        .badge-def  { background: #334155; color: #94a3b8; }
        .badge-rec  { background: #1e5f1e; color: #86efac; }
        .badge-unsanctioned { background: #78350f; color: #fcd34d; font-size: 0.58rem; padding: 1px 6px; }

        /* ── Venue line ── */
        .game-venue {
            padding: 4px 14px 5px;
            font-size: 0.72rem;
            color: #888;
            background: #fafbfc;
            border-bottom: 1px solid #f0f0f0;
        }
        .game-venue::before { content: '📍 '; }

        /* ── Slots grid ── */
        .slots-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
        }

        .slots-row.one-slot {
            grid-template-columns: 1fr;
        }

        .slot-box {
            padding: 10px 12px;
            border-right: 1px solid #eee;
            text-align: center;
        }
        .slot-box:last-child { border-right: none; }

        .slot-label {
            font-size: 0.6rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 5px;
        }

        /* FILLED badge */
        .slot-filled {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 6px;
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* OPEN badge */
        .slot-open {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 6px;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            font-size: 0.72rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse-open 1.5s ease-in-out infinite;
        }

        @keyframes pulse-open {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(185,28,28,0.3); }
            50%       { opacity: 0.85; box-shadow: 0 0 0 4px rgba(185,28,28,0); }
        }

        /* ── Availability link ── */
        .avail-link {
            display: block;
            padding: 15px 16px;
            background: #00c853;
            border-top: 1px solid rgba(0,0,0,0.08);
            text-align: center;
            font-size: 1.15rem;
            font-weight: 800;
            color: #06200f;
            text-decoration: none;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: background 0.15s, transform 0.1s;
        }
        .avail-link:hover { background: #00e65c; transform: translateY(-1px); }
        .avail-link::before { content: '👉 '; font-size: 1.5rem; vertical-align: middle; }

        /* ── Loading / empty ── */
        .loading-state, .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.9rem;
        }
        .loading-spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent, #00c853);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes throb {
            0%, 100% { transform: scale(1);    opacity: 1; }
            50%       { transform: scale(1.35); opacity: 0.6; }
        }

        .empty-icon { font-size: 2rem; margin-bottom: 10px; }
        .empty-msg  { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 6px; }
        .empty-sub  { font-size: 0.82rem; color: rgba(255,255,255,0.3); }

        @media (max-width: 540px) {
            .page-title { font-size: 1.9rem; }
            .logo-mark  { --sz: 60px; }
            .slots-row  { grid-template-columns: 1fr; }
            .slot-box   { border-right: none; border-bottom: 1px solid #eee; }
            .slot-box:last-child { border-bottom: none; }
            .filter-bar { flex-wrap: wrap; }
            .filter-group { width: 100%; }
            .filter-group .filter-btn { flex: 1; }
            .club-selector { width: 100%; flex: unset; }
        }

    </style>
</head>
<body>
<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="header-text">
            <div class="eyebrow">Live · Updated every 60 seconds</div>
            <h1 class="page-title">Open Game<br><span class="line2">Slots</span></h1>
            <p class="page-sub">Games below have at least one referee slot still open. Check back anytime — this updates automatically.</p>
        </div>
        <div class="logo-mark">
            <div class="lcard lcard-red"></div>
            <div class="lcard lcard-yellow"></div>
            <div class="logo-text">
                <span class="logo-line1">Referee</span>
                <span class="logo-line2">Tool</span>
                <span class="logo-underline"></span>
            </div>
        </div>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
        <div class="filter-group">
            <button class="filter-btn active" onclick="setWeekFilter('this', this)">This Week</button>
            <button class="filter-btn" onclick="setWeekFilter('next', this)">Next Week</button>
            <button class="filter-btn" onclick="setWeekFilter('all', this)">All</button>
        </div>
        <div class="club-selector" id="clubSelector">
            <span class="club-selector-label">Club/Event</span>
            <div class="club-rotator-wrap">
                <div class="club-rotator-name" id="clubRotatorName">All</div>
            </div>
            <span class="club-selector-arrow">▼</span>
            <select id="clubSelectNative" onchange="onClubSelectChange(this)">
                <option value="all">All Clubs</option>
            </select>
        </div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
        <div class="status-count"><span class="refresh-dot"></span><span id="gameCount">—</span> open games</div>
        <div class="status-updated" id="lastUpdated">Loading…</div>
    </div>

    <!-- Instruction line -->
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:14px;">
        <span style="color:#00c853; font-size:1.1rem; animation: throb 1.2s ease-in-out infinite;">▶</span>
        <span style="color:#ef4444; font-size:0.82rem; font-weight:700; letter-spacing:0.3px;">Select a game below to view open slots and submit your availability</span>
    </div>

    <!-- Game list -->
    <div id="gameList">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            Loading open slots…
        </div>
    </div>

</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>

    let CLUBS        = ['Griswold', 'East Haddam']; // overridden by settings table on load
    let TOURNAMENTS  = []; // active tournaments with avail_enabled = true
    let _formConfig  = {};
    let _recOrgs     = []; // active recreation orgs from settings

    let _allOpenGames = [];
    let _weekFilter   = 'this';
    let _clubFilter   = 'all';

    function getWeekBounds(offset) {
        const now  = new Date();
        const dow  = now.getDay(); // 0=Sun
        const mon  = new Date(now); mon.setDate(now.getDate() - dow + (dow === 0 ? -6 : 1) + offset * 7);
        const sun  = new Date(mon); sun.setDate(mon.getDate() + 6);
        return {
            from: mon.toISOString().split('T')[0],
            to:   sun.toISOString().split('T')[0]
        };
    }

    function applyFilters() {
        let games = _allOpenGames;
        if (_clubFilter !== 'all') {
            games = games.filter(g => (g['Source Club'] || '') === _clubFilter);
        }
        if (_weekFilter !== 'all') {
            const bounds = getWeekBounds(_weekFilter === 'this' ? 0 : 1);
            games = games.filter(g => g.date >= bounds.from && g.date <= bounds.to);
        }
        render(games);
    }

    function setWeekFilter(val, btn) {
        _weekFilter = val;
        btn.closest('.filter-group').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }

    // ── Club rotator ──
    let _rotatorClubs = [];
    let _rotatorIdx   = 0;
    let _rotatorTimer = null;

    function setRotatorClubs(clubs) {
        _rotatorClubs = ['All Clubs', ...clubs];
        _rotatorIdx = 0;
        clearInterval(_rotatorTimer);
        if (_clubFilter === 'all') startRotator();
    }

    function startRotator() {
        clearInterval(_rotatorTimer);
        if (_rotatorClubs.length <= 1) return;
        _rotatorTimer = setInterval(rotatorTick, 2200);
    }

    function stopRotator() {
        clearInterval(_rotatorTimer);
        _rotatorTimer = null;
    }

    function rotatorTick() {
        if (_clubFilter !== 'all') { stopRotator(); return; }
        const el = document.getElementById('clubRotatorName');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(() => {
            _rotatorIdx = (_rotatorIdx + 1) % _rotatorClubs.length;
            el.textContent = _rotatorClubs[_rotatorIdx];
            el.classList.remove('fade-out');
            el.classList.add('fade-in');
            requestAnimationFrame(() => requestAnimationFrame(() => {
                el.classList.remove('fade-in');
            }));
        }, 400);
    }

    function setRotatorDisplay(label) {
        const el = document.getElementById('clubRotatorName');
        if (!el) return;
        el.classList.add('fade-out');
        setTimeout(() => {
            el.textContent = label;
            el.classList.remove('fade-out');
            el.classList.add('fade-in');
            requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('fade-in')));
        }, 400);
    }

    function onClubSelectChange(sel) {
        const val = sel.value;
        const selector = document.getElementById('clubSelector');
        if (val === 'all') {
            _clubFilter = 'all';
            selector.classList.remove('has-selection');
            setRotatorDisplay('All Clubs');
            startRotator();
        } else {
            _clubFilter = val;
            selector.classList.add('has-selection');
            stopRotator();
            setRotatorDisplay(val === 'RECREATION' ? 'Recreation' : val);
        }
        applyFilters();
    }

    function setClubFilter(val, btn) {
        _clubFilter = val;
        applyFilters();
    }

    const CLUB_BADGE = {
        'Griswold':     { cls: 'badge-gri', label: 'Griswold' },
        'East Haddam':  { cls: 'badge-eh',  label: 'East Haddam' },
        'RHAMYS':       { cls: 'badge-rhm', label: 'RHAMYS' },
        'Lebanon':      { cls: 'badge-leb', label: 'Lebanon' },
        'RECREATION':   { cls: 'badge-rec', label: 'Recreation' },
    };

    let venueMap = {};

    function isFilled(v) {
        return !!(v && String(v).trim() !== '' && v !== '—' && v !== '[]' && v !== 'null') || String(v).toUpperCase() === 'EMPTY';
    }

    function hasOpenSlot(g) {
        const age = (g['Age Group'] || '').toUpperCase();
        const isU8 = age.startsWith('U8') || age.startsWith('U-8');
        if (isU8) return !isFilled(g['Center Referee']);
        return !isFilled(g['Center Referee']) || !isFilled(g['AR 1']) || !isFilled(g['AR 2']);
    }

    function isU8Game(g) {
        const age = (g['Age Group'] || '').toUpperCase();
        return age.startsWith('U8') || age.startsWith('U-8');
    }

    function formatDate(d) {
        if (!d) return '—';
        const dt = new Date(d + 'T12:00:00');
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${days[dt.getDay()]} · ${months[dt.getMonth()]} ${dt.getDate()}`;
    }

    function formatDateHeader(d) {
        if (!d) return '';
        const dt = new Date(d + 'T12:00:00');
        const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const text = `${days[dt.getDay()]} · ${months[dt.getMonth()]} ${dt.getDate()}`;
        return `<div class="date-divider"><span class="date-divider-text">${text}</span><div class="date-divider-line"></div></div>`;
    }

    function formatTime(t) {
        if (!t) return '';
        const [h, m] = t.split(':').map(Number);
        return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }

    function slotBadge(filled) {
        return filled
            ? `<span class="slot-filled">Filled</span>`
            : `<span class="slot-open">Open</span>`;
    }

    function buildCard(g) {
        const club      = g['Source Club'] || '';
        const badgeInfo = CLUB_BADGE[club] || { cls: 'badge-def', label: club };
        const age       = g['Age Group'] || '';
        const home      = g['Home Team'] || '?';
        const away      = g['Away Team'] || '?';
        const time      = formatTime(g['time'] || g['Time'] || '');
        const venueId   = g['Venue ID'];
        const venue     = venueId ? (venueMap[String(venueId)] || '') : '';
        const u8        = isU8Game(g);

        const crFilled  = isFilled(g['Center Referee']);
        const ar1Filled = isFilled(g['AR 1']);
        const ar2Filled = isFilled(g['AR 2']);

        const openCount = u8
            ? (!crFilled ? 1 : 0)
            : (!crFilled ? 1 : 0) + (!ar1Filled ? 1 : 0) + (!ar2Filled ? 1 : 0);

        const slotsHtml = u8
            ? `<div class="slots-row one-slot">
                <div class="slot-box">
                    <div class="slot-label">Center</div>
                    ${slotBadge(crFilled)}
                </div>
               </div>`
            : `<div class="slots-row">
                <div class="slot-box">
                    <div class="slot-label">Center</div>
                    ${slotBadge(crFilled)}
                </div>
                <div class="slot-box">
                    <div class="slot-label">AR 1</div>
                    ${slotBadge(ar1Filled)}
                </div>
                <div class="slot-box">
                    <div class="slot-label">AR 2</div>
                    ${slotBadge(ar2Filled)}
                </div>
               </div>`;

        const isRec     = club === 'RECREATION';
        const org       = g.organization || '';
        const payType   = g.pay_type || '';
        const gameDesc  = `${home} vs ${away} (${age}) — ${formatDate(g.date || '')}${time ? ' @ ' + time : ''}`;
        const noteParam = encodeURIComponent(`Interested in ${gameDesc}`);
        const formCfg   = _formConfig[club] || {};
        const isJotform = !isRec && formCfg.formType === 'jotform';
        const availUrl  = isRec
            ? `recreation-portal.html`
            : (isJotform && formCfg.jotformUrl)
                ? formCfg.jotformUrl
                : `referee-availability-form.html?dates=${g.date || ''}&club=${encodeURIComponent(club)}&note=${noteParam}${(g.time||g.Time||g['Time']) ? '&time=' + encodeURIComponent((g.time||g.Time||g['Time'])) : ''}`;
        const availLabel = isRec ? 'Contact Your Assignor to Work This Game' : 'Click Here to Submit Your Availability for This Game';
        const finalSlotsHtml = isJotform ? '' : slotsHtml;

        return `<div class="game-card">
            <div class="game-card-header">
                <span class="game-chevron">▶</span>
                <span class="game-teams">${home} vs ${away}</span>
                <span class="game-meta-line">${time}</span>
                ${age ? `<span class="badge badge-age">${age}</span>` : ''}
                ${isRec && org ? `<span class="badge badge-def" style="font-size:0.6rem;">${org}</span>` : ''}
                <span class="badge ${badgeInfo.cls}">${badgeInfo.label}</span>
                ${isRec ? `<span class="badge badge-unsanctioned">Unsanctioned</span>` : ''}
                ${!isJotform ? `<span class="badge badge-open">${openCount} Open</span>` : ''}
            </div>
            <div class="game-card-body">
                ${venue ? `<div class="game-venue">${venue}</div>` : ''}
                ${finalSlotsHtml}
                ${isRec && payType ? `<div style="padding:6px 14px; background:#fffbeb; border-top:1px solid #fef3c7; font-size:0.75rem; color:#92400e;"><strong>Payment:</strong> ${payType}</div>` : ''}
                <a class="avail-link" href="${availUrl}" ${isRec ? 'style="background:#1d4ed8;"' : ''}>${availLabel}</a>
            </div>
        </div>`;
    }

    function render(games) {
        const list = document.getElementById('gameList');
        const countEl = document.getElementById('gameCount');
        const updEl   = document.getElementById('lastUpdated');

        const now = new Date();
        updEl.textContent = `Updated ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

        if (!games.length) {
            countEl.textContent = '0';
            list.innerHTML = `<div class="empty-state">
                <div class="empty-icon">✅</div>
                <div class="empty-msg">All slots are filled!</div>
                <div class="empty-sub">No open games right now. Check back soon.</div>
            </div>`;
            return;
        }

        countEl.textContent = games.length;

        let html = '';
        let lastDate = null;
        games.forEach(g => {
            const d = g.date || g.Date || '';
            if (d !== lastDate) {
                lastDate = d;
                html += formatDateHeader(d);
            }
            html += buildCard(g);
        });

        list.innerHTML = html;

        // Wire collapse toggle
        list.querySelectorAll('.game-card-header').forEach(header => {
            header.addEventListener('click', () => {
                header.closest('.game-card').classList.toggle('open');
            });
        });
    }

    async function loadData() {
        try {
            const _now = new Date();
            const today = _now.getFullYear() + '-' + String(_now.getMonth()+1).padStart(2,'0') + '-' + String(_now.getDate()).padStart(2,'0');

            // Fetch active clubs + tournaments + form routing + rec orgs
            const [settingRes, formConfigRes, recOrgsRes, tournRes] = await Promise.all([
                supabaseClient.client.from('settings').select('value').eq('key', 'openings_clubs').maybeSingle(),
                supabaseClient.client.from('settings').select('value').eq('key', 'openings_form_config').maybeSingle(),
                supabaseClient.client.from('settings').select('value').eq('key', 'openings_recreation_orgs').maybeSingle(),
                supabaseClient.client.from('tournaments').select('key, name').eq('avail_enabled', true).eq('status', 'active').order('name')
            ]);
            if (settingRes.data?.value) {
                try { CLUBS = JSON.parse(settingRes.data.value); } catch(e) {}
            }
            try { _formConfig = JSON.parse(formConfigRes.data?.value || '{}'); } catch(e) { _formConfig = {}; }
            try { _recOrgs    = JSON.parse(recOrgsRes.data?.value    || '[]'); } catch(e) { _recOrgs = []; }
            TOURNAMENTS = tournRes.data || [];

            // Build selector dropdown + rotator
            const allFilterClubs = [...CLUBS, ...(_recOrgs.length ? ['RECREATION'] : []), ...TOURNAMENTS.map(t => t.name)];
            const savedClub = _clubFilter;
            _clubFilter = (savedClub === 'all' || allFilterClubs.includes(savedClub)) ? savedClub : 'all';
            const sel = document.getElementById('clubSelectNative');
            sel.innerHTML = `<option value="all">All</option>` +
                CLUBS.map(c => `<option value="${c}">${c}</option>`).join('') +
                (_recOrgs.length ? `<option value="RECREATION">Recreation</option>` : '') +
                (TOURNAMENTS.length ? TOURNAMENTS.map(t => `<option value="${t.name}">🏆 ${t.name}</option>`).join('') : '');
            sel.value = _clubFilter;
            const selector = document.getElementById('clubSelector');
            if (_clubFilter !== 'all') {
                selector.classList.add('has-selection');
                document.getElementById('clubRotatorName').textContent = _clubFilter === 'RECREATION' ? 'Recreation' : _clubFilter;
                stopRotator();
            } else {
                selector.classList.remove('has-selection');
                document.getElementById('clubRotatorName').textContent = 'All';
            }
            setRotatorClubs(allFilterClubs.map(c => c === 'RECREATION' ? 'Recreation' : c));

            const [venueRes, ...allResults] = await Promise.all([
                supabaseClient.client.from('venues').select('id, "Venue ID", "Venue Name", name').limit(500),
                ...CLUBS.map(club =>
                    supabaseClient.client.from('games').select('*')
                        .eq('Source Club', club).gte('date', today)
                        .order('date', { ascending: true }).limit(500)
                ),
                ...(_recOrgs.length ? [
                    supabaseClient.client.from('games').select('*')
                        .eq('Source Club', 'RECREATION').in('organization', _recOrgs)
                        .gte('date', today).order('date', { ascending: true }).limit(500)
                ] : []),
                ...TOURNAMENTS.map(t =>
                    supabaseClient.client.from('tournament_games').select('*')
                        .eq('Source Club', t.name).gte('date', today)
                        .order('date', { ascending: true }).limit(500)
                )
            ]);

            // Build venue lookup
            venueMap = {};
            (venueRes.data || []).forEach(v => {
                const nm = v['Venue Name'] || v.name || '';
                if (v['Venue ID']) venueMap[String(v['Venue ID'])] = nm;
                if (v.id)          venueMap[String(v.id)]          = nm;
            });

            // Merge + filter + sort
            const allGames = allResults.flatMap(r => r.data || []);
            _allOpenGames = allGames
                .filter(g => (g['Game Status'] || '') !== 'Cancelled' && (g['Game Status'] || '') !== 'Filled')
                .filter(hasOpenSlot)
                .sort((a, b) => {
                    const da = (a.date || '') + '|' + (a.time || a.Time || '');
                    const db = (b.date || '') + '|' + (b.time || b.Time || '');
                    return da.localeCompare(db);
                });

            applyFilters();
        } catch (err) {
            console.error('Load error:', err);
            document.getElementById('gameList').innerHTML =
                `<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-msg">Failed to load</div><div class="empty-sub">${err.message}</div></div>`;
        }
    }

    // Apply URL params as initial filter state (when arriving from email link)
    (function() {
        const p = new URLSearchParams(window.location.search);
        const w = p.get('week'), c = p.get('club');
        if (w && ['this','next','all'].includes(w)) {
            _weekFilter = w;
            document.querySelectorAll('.filter-group')[0].querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active',
                    (b.textContent.trim() === 'This Week' && w === 'this') ||
                    (b.textContent.trim() === 'Next Week' && w === 'next') ||
                    (b.textContent.trim() === 'All'       && w === 'all')
                );
            });
        }
        if (c) _clubFilter = c; // validated against CLUBS list when loadData runs
    })();

    // Initial load + auto-refresh every 60s
    loadData();
    setInterval(loadData, 60000);

</script>
</body>
</html>
