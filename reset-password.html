<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Referee Tool</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }


        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#0f3460; margin:0; }
        .card { background:white; border-radius:12px; padding:40px; box-shadow:0 4px 20px rgba(0,0,0,0.2); width:100%; max-width:400px; text-align:center; }
        h2 { color:#0f3460; margin-bottom:24px; }
        label { display:block; text-align:left; font-size:0.85rem; font-weight:600; margin-bottom:4px; color:#333; }
        input[type=password] { width:100%; box-sizing:border-box; padding:10px 12px; font-size:0.9rem; border:1px solid #ccc; border-radius:6px; margin-bottom:16px; }
        button { padding:10px 28px; background:linear-gradient(135deg,#e94560,#c0392b); color:white; border:none; border-radius:6px; font-size:0.9rem; font-weight:600; cursor:pointer; }
        .msg { margin-top:14px; font-size:0.85rem; }
        .msg.error { color:#c0392b; }
        .msg.success { color:#27ae60; }
    </style>
</head>
<body>
<div class="card">
    <h2>Set New Password</h2>
    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" placeholder="Enter new password">
    <label for="confirmPassword">Confirm Password</label>
    <input type="password" id="confirmPassword" placeholder="Confirm new password">
    <button id="saveBtn">Save Password</button>
    <div id="msg" class="msg"></div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
    const client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const msg    = document.getElementById('msg');

    (async () => {
        // Parse tokens from URL hash and set the session
        const hashParams = Object.fromEntries(
            window.location.hash.replace('#', '').split('&').map(p => p.split('='))
        );
        if (hashParams.access_token && hashParams.refresh_token) {
            await client.auth.setSession({
                access_token:  hashParams.access_token,
                refresh_token: hashParams.refresh_token
            });
        }

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const np = document.getElementById('newPassword').value;
            const cp = document.getElementById('confirmPassword').value;

            if (!np || np.length < 6) {
                msg.className = 'msg error';
                msg.textContent = 'Password must be at least 6 characters.';
                return;
            }
            if (np !== cp) {
                msg.className = 'msg error';
                msg.textContent = 'Passwords do not match.';
                return;
            }

            const { error } = await client.auth.updateUser({ password: np });
            if (error) {
                msg.className = 'msg error';
                msg.textContent = 'Error: ' + error.message;
            } else {
                msg.className = 'msg success';
                msg.textContent = 'Password updated! Redirecting to login...';
                setTimeout(() => window.location.href = 'admin.html', 2000);
            }
        });
    })();
</script>
</body>
</html>
