<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Detail — Referee Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }
        .lead-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            padding: 32px 36px;
            max-width: 680px;
            margin: 48px auto;
        }
        .lead-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #aaa;
            margin-bottom: 3px;
        }
        .lead-value {
            font-size: 0.95rem;
            color: #09142a;
            margin-bottom: 18px;
            line-height: 1.5;
        }
        .lead-name {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #09142a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }
        .lead-meta {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 28px;
        }
        .divider {
            border: none;
            border-top: 1px solid #e2d9ce;
            margin: 24px 0;
        }
        .notes-area {
            width: 100%;
            box-sizing: border-box;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 12px 14px;
            border: 2px solid #e2d9ce;
            border-radius: 10px;
            resize: vertical;
            min-height: 120px;
            outline: none;
            color: #09142a;
            transition: border-color 0.2s;
        }
        .notes-area:focus { border-color: #09142a; }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .btn-save {
            background: #09142a;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-reply {
            background: #00c853;
            color: #09142a;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-archive {
            background: #fef3c7;
            color: #b45309;
            border: none;
            border-radius: 8px;
            padding: 10px 22px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            cursor: pointer;
            margin-left: auto;
        }
        .save-msg {
            font-size: 0.85rem;
            font-weight: 700;
            color: #00c853;
            display: none;
            align-self: center;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            margin: 24px 0 0;
            background: #00c853;
            color: #09142a;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.95rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 8px;
        }
        .back-link:hover { background: #00e676; }
        /* ── Logo mark ── */
        .logo-mark { --sz:56px; position:relative; width:var(--sz); height:var(--sz); flex-shrink:0; }
        .lcard { position:absolute; border-radius:calc(var(--sz)*0.065); }
        .lcard-red { width:calc(var(--sz)*0.58); height:calc(var(--sz)*0.82); background:linear-gradient(145deg,#f87171 0%,#ef4444 55%,#b91c1c 100%); box-shadow:0 calc(var(--sz)*0.02) calc(var(--sz)*0.12) rgba(239,68,68,0.45); top:calc(var(--sz)*0.21); left:calc(var(--sz)*0.32); transform:rotate(22deg); }
        .lcard-yellow { width:calc(var(--sz)*0.64); height:calc(var(--sz)*0.88); background:linear-gradient(145deg,#fde047 0%,#f59e0b 55%,#b45309 100%); box-shadow:0 0 calc(var(--sz)*0.2) rgba(245,158,11,0.6),0 0 calc(var(--sz)*0.4) rgba(245,158,11,0.2),0 calc(var(--sz)*0.05) calc(var(--sz)*0.18) rgba(0,0,0,0.5); top:calc(var(--sz)*0.12); left:calc(var(--sz)*0.18); transform:rotate(10deg); }
        .lcard-yellow::before { content:''; position:absolute; top:8%; left:10%; width:14%; height:52%; background:linear-gradient(180deg,rgba(255,255,255,0.38) 0%,rgba(255,255,255,0) 100%); border-radius:3px; }
        .logo-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:calc(var(--sz)*0.10); font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; text-align:center; z-index:10; line-height:0.88; letter-spacing:2px; }
        .logo-line1 { color:#fff; font-size:calc(var(--sz)*0.2); text-shadow:0 2px 12px rgba(0,0,0,0.95); }
        .logo-line2 { color:#00c853; font-size:calc(var(--sz)*0.32); text-shadow:0 2px 12px rgba(0,0,0,0.95); margin-top:calc(var(--sz)*-0.01); transform:skewX(-14deg); display:block; }
        .logo-underline { display:block; height:calc(var(--sz)*0.022); width:calc(var(--sz)*0.58); margin-top:calc(var(--sz)*0.025); background:#ef4444; border-radius:calc(var(--sz)*0.01); box-shadow:0 0 calc(var(--sz)*0.04) rgba(239,68,68,0.85); transform:skewX(-14deg); }
        #loadingState { text-align: center; color: rgba(255,255,255,0.5); padding: 80px 0; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="container" style="max-width:720px; padding:0 20px;">

    <div id="loadingState">Loading…</div>

    <div id="leadDetail" style="display:none;">
        <a href="superadmin.html" class="back-link">← Back to Super Admin</a>
        <div class="lead-card">
            <div style="display:flex; align-items:center; gap:14px; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid #e2d9ce;">
                <div class="logo-mark">
                    <div class="lcard lcard-red"></div>
                    <div class="lcard lcard-yellow"></div>
                    <div class="logo-text">
                        <span class="logo-line1">Referee</span>
                        <span class="logo-line2">Tool</span>
                        <span class="logo-underline"></span>
                    </div>
                </div>
                <div>
                    <div style="font-family:'Barlow Condensed',sans-serif; font-size:1.4rem; font-weight:800; color:#09142a; text-transform:uppercase; letter-spacing:1px; line-height:1;">Referee Tool — Lead</div>
                    <div style="font-size:0.8rem; color:#aaa; margin-top:2px;">Demo inquiry detail</div>
                </div>
            </div>

            <div id="leadName" class="lead-name"></div>
            <div id="leadMeta" class="lead-meta"></div>

            <div class="lead-label">Club</div>
            <div id="leadClub" class="lead-value"></div>

            <div class="lead-label">Email</div>
            <div id="leadEmail" class="lead-value"></div>

            <div class="lead-label">Phone</div>
            <div id="leadPhone" class="lead-value"></div>

            <div class="lead-label">Role</div>
            <div id="leadRole" class="lead-value"></div>

            <div class="lead-label">Message</div>
            <div id="leadMessage" class="lead-value"></div>

            <hr class="divider">

            <div class="lead-label" style="margin-bottom:8px;">Your Notes</div>
            <textarea id="assignorNotes" class="notes-area" placeholder="Add your notes, follow-up status, next steps…"></textarea>

            <div class="btn-row">
                <button class="btn-save" onclick="saveNotes()">Save Notes</button>
                <a id="replyBtn" href="#" class="btn-reply">Reply via Email ↗</a>
                <span id="saveMsg" class="save-msg">✓ Saved</span>
                <button class="btn-archive" onclick="archiveLead()">Archive</button>
            </div>
        </div><!-- /lead-card -->
    </div><!-- /leadDetail -->

</div>

<script src="config.js"></script>
<script src="js/admin-auth.js"></script>
<script>checkAdminAccess();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js?v=11"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const leadId = parseInt(params.get('id'));
    let leadData = null;

    async function loadLead() {
        if (!leadId) { document.getElementById('loadingState').textContent = 'No lead ID provided.'; return; }

        const { data, error } = await supabaseClient.client
            .from('leads')
            .select('*')
            .eq('id', leadId)
            .single();

        document.getElementById('loadingState').style.display = 'none';

        if (error || !data) {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('loadingState').textContent = 'Lead not found.';
            return;
        }

        leadData = data;
        const ts = new Date(data.created_at).toLocaleString('en-US', {
            weekday: 'long', month: 'long', day: 'numeric', year: 'numeric',
            hour: 'numeric', minute: '2-digit'
        });

        document.getElementById('leadName').textContent      = data.name;
        document.getElementById('leadMeta').textContent      = 'Submitted ' + ts;
        document.getElementById('leadClub').textContent      = data.club || '—';
        document.getElementById('leadEmail').textContent     = data.email || '—';
        document.getElementById('leadPhone').textContent     = data.phone || '—';
        document.getElementById('leadRole').textContent      = data.role || '—';
        document.getElementById('leadMessage').textContent   = data.message || '—';
        document.getElementById('assignorNotes').value       = data.assignor_notes || '';
        document.getElementById('replyBtn').href             =
            `mailto:${data.email}?subject=Re: Referee Tool Inquiry — ${data.club}`;

        // Mark viewed
        await supabaseClient.client.from('leads').update({ viewed: true }).eq('id', leadId);

        document.getElementById('leadDetail').style.display = 'block';
    }

    async function saveNotes() {
        const notes = document.getElementById('assignorNotes').value.trim();
        const { error } = await supabaseClient.client
            .from('leads')
            .update({ assignor_notes: notes })
            .eq('id', leadId);

        if (!error) {
            const msg = document.getElementById('saveMsg');
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 2500);
        }
    }

    async function archiveLead() {
        if (!confirm('Archive this lead?')) return;
        await supabaseClient.client.from('leads').update({ archived: true }).eq('id', leadId);
        window.close();
    }

    loadLead();
</script>
</body>
</html>
