<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referee Tool — Leads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }
        /* ── Logo mark ── */
        .logo-mark { --sz:72px; position:relative; width:var(--sz); height:var(--sz); flex-shrink:0; }
        .lcard { position:absolute; border-radius:calc(var(--sz)*0.065); }
        .lcard-red { width:calc(var(--sz)*0.58); height:calc(var(--sz)*0.82); background:linear-gradient(145deg,#f87171 0%,#ef4444 55%,#b91c1c 100%); box-shadow:0 calc(var(--sz)*0.02) calc(var(--sz)*0.12) rgba(239,68,68,0.45); top:calc(var(--sz)*0.21); left:calc(var(--sz)*0.32); transform:rotate(22deg); }
        .lcard-yellow { width:calc(var(--sz)*0.64); height:calc(var(--sz)*0.88); background:linear-gradient(145deg,#fde047 0%,#f59e0b 55%,#b45309 100%); box-shadow:0 0 calc(var(--sz)*0.2) rgba(245,158,11,0.6),0 0 calc(var(--sz)*0.4) rgba(245,158,11,0.2),0 calc(var(--sz)*0.05) calc(var(--sz)*0.18) rgba(0,0,0,0.5); top:calc(var(--sz)*0.12); left:calc(var(--sz)*0.18); transform:rotate(10deg); }
        .lcard-yellow::before { content:''; position:absolute; top:8%; left:10%; width:14%; height:52%; background:linear-gradient(180deg,rgba(255,255,255,0.38) 0%,rgba(255,255,255,0) 100%); border-radius:3px; }
        .logo-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:calc(var(--sz)*0.10); font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; text-align:center; z-index:10; line-height:0.88; letter-spacing:2px; }
        .logo-line1 { color:#fff; font-size:calc(var(--sz)*0.2); text-shadow:0 2px 12px rgba(0,0,0,0.95); }
        .logo-line2 { color:#00c853; font-size:calc(var(--sz)*0.32); text-shadow:0 2px 12px rgba(0,0,0,0.95); margin-top:calc(var(--sz)*-0.01); transform:skewX(-14deg); display:block; }
        .logo-underline { display:block; height:calc(var(--sz)*0.022); width:calc(var(--sz)*0.58); margin-top:calc(var(--sz)*0.025); background:#ef4444; border-radius:calc(var(--sz)*0.01); box-shadow:0 0 calc(var(--sz)*0.04) rgba(239,68,68,0.85); transform:skewX(-14deg); }

        .leads-wrap { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

        .lead-row { border:1px solid #e2d9ce; border-radius:8px; overflow:hidden; background:#fff; margin-bottom:8px; }
        .lead-row-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; }
        .lead-row-header:hover { background:#fafaf8; }
        .lead-expand { display:none; padding:16px 18px; border-top:1px solid #e2d9ce; font-size:0.88rem; color:#444; line-height:1.6; }
        .lead-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px 24px; margin-bottom:12px; }
        .lead-field-label { font-weight:700; color:#09142a; }
        .notes-area { width:100%; box-sizing:border-box; font-family:'DM Sans',sans-serif; font-size:0.88rem; padding:10px 12px; border:2px solid #e2d9ce; border-radius:8px; resize:vertical; min-height:80px; outline:none; color:#09142a; transition:border-color 0.2s; }
        .notes-area:focus { border-color:#09142a; }
        .action-row { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center; }
        .btn-save { background:#09142a; color:#fff; border:none; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; cursor:pointer; }
        .btn-reply { background:#00c853; color:#09142a; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; text-decoration:none; }
        .btn-fullpage { background:#f0ece6; color:#09142a; border:1px solid #e2d9ce; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; text-decoration:none; }
        .btn-archive { background:#fef3c7; color:#b45309; border:none; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; cursor:pointer; margin-left:auto; }
        .save-msg { font-size:0.82rem; font-weight:700; color:#00c853; display:none; }
        .new-dot { display:inline-block; width:8px; height:8px; background:#e94560; border-radius:50%; flex-shrink:0; }
        .empty-dot { display:inline-block; width:8px; height:8px; flex-shrink:0; }
    </style>
</head>
<body>
<div class="container">

    <header style="position:relative;">
        <div class="header-brand" style="display:inline-flex; align-items:center; gap:16px; justify-content:center;">
            <div class="logo-mark">
                <div class="lcard lcard-red"></div>
                <div class="lcard lcard-yellow"></div>
                <div class="logo-text">
                    <span class="logo-line1">Referee</span>
                    <span class="logo-line2">Tool</span>
                    <span class="logo-underline"></span>
                </div>
            </div>
            <h1 style="margin:0;">Leads &amp; Sales</h1>
        </div>
        <p class="subtitle">Demo inquiries from referee-tool.com</p>
    </header>

    <main>
        <div class="leads-wrap">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                <a href="superadmin.html" style="background:#00c853; color:#09142a; font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:800; text-transform:uppercase; padding:8px 18px; border-radius:8px; text-decoration:none;">← Back to Super Admin</a>
                <div style="font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; color:rgba(255,255,255,0.5);" id="leadCount"></div>
            </div>

            <div id="leadsLoading" style="color:rgba(255,255,255,0.4); text-align:center; padding:60px 0; font-size:0.9rem;">Loading…</div>
            <div id="leadsEmpty" style="display:none; color:rgba(255,255,255,0.4); text-align:center; padding:60px 0; font-size:0.9rem;">No inquiries yet.</div>
            <div id="leadsList"></div>
        </div>
    </main>

</div>

<script src="config.js"></script>
<script src="js/admin-auth.js"></script>
<script>checkAdminAccess();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js?v=12"></script>
<script>
    async function loadLeads() {
        const { data, error } = await supabaseClient.client
            .from('leads')
            .select('*')
            .eq('archived', false)
            .order('created_at', { ascending: false });

        document.getElementById('leadsLoading').style.display = 'none';

        if (error || !data || data.length === 0) {
            document.getElementById('leadsEmpty').style.display = 'block';
            return;
        }

        document.getElementById('leadCount').textContent = data.length + ' lead' + (data.length !== 1 ? 's' : '');

        const unviewed = data.filter(l => !l.viewed).length;
        if (unviewed > 0) {
            document.getElementById('leadCount').textContent += ' · ' + unviewed + ' new';
        }

        document.getElementById('leadsList').innerHTML = data.map(l => {
            const ts = new Date(l.created_at).toLocaleString('en-US', {
                weekday:'short', month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'
            });
            const dot = !l.acknowledged
                ? `<span class="new-dot" id="lead-dot-${l.id}"></span>`
                : `<span class="empty-dot" id="lead-dot-${l.id}"></span>`;
            return `
            <div class="lead-row" id="lead-row-${l.id}">
                <div class="lead-row-header" onclick="toggleLead(${l.id})">
                    ${dot}
                    <div style="flex:1; min-width:0;">
                        <span style="font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1rem; color:#09142a; text-transform:uppercase; letter-spacing:0.5px;">${l.name}</span>
                        <span style="font-size:0.78rem; color:#888; margin-left:10px;">${l.club} · ${l.email} · ${ts}</span>
                    </div>
                    <span id="lead-chevron-${l.id}" style="font-size:0.75rem; color:#aaa; flex-shrink:0;">▼</span>
                </div>
                <div class="lead-expand" id="lead-detail-${l.id}">
                    <div class="lead-grid">
                        <div><span class="lead-field-label">Phone:</span> ${l.phone || '—'}</div>
                        <div><span class="lead-field-label">Role:</span> ${l.role || '—'}</div>
                        <div style="grid-column:1/-1;"><span class="lead-field-label">Message:</span><br>${l.message ? l.message.replace(/\n/g,'<br>') : '—'}</div>
                    </div>
                    <div style="font-family:'Barlow Condensed',sans-serif; font-size:0.75rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin-bottom:6px;">Your Notes</div>
                    <textarea class="notes-area" id="lead-notes-${l.id}" placeholder="Follow-up status, next steps, anything…">${l.assignor_notes || ''}</textarea>
                    <div class="action-row">
                        <button class="btn-save" onclick="saveLead(${l.id})">Save Notes</button>
                        <a class="btn-reply" href="https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(l.email)}&su=${encodeURIComponent('Re: Referee Tool Inquiry \u2014 ' + l.club)}" target="_blank">Reply ↗</a>
                        <a class="btn-fullpage" href="lead-detail.html?id=${l.id}" target="_blank">Full Page ↗</a>
                        <span class="save-msg" id="lead-save-msg-${l.id}">✓ Saved</span>
                        ${l.acknowledged
                            ? `<span style="font-size:0.78rem; font-weight:700; color:#27ae60;">✓ Acknowledged</span>`
                            : `<button class="btn-save" style="background:#27ae60; border-color:#27ae60;" onclick="acknowledgeLead(${l.id})">Acknowledged</button>`
                        }
                        <button class="btn-archive" onclick="archiveLead(${l.id})">Archive</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Mark all as viewed
        await supabaseClient.client.from('leads').update({ viewed: true }).eq('viewed', false);
    }

    function toggleLead(id) {
        const detail  = document.getElementById('lead-detail-' + id);
        const chevron = document.getElementById('lead-chevron-' + id);
        const open    = detail.style.display !== 'block';
        detail.style.display = open ? 'block' : 'none';
        chevron.textContent  = open ? '▲' : '▼';
    }

    async function saveLead(id) {
        const notes = document.getElementById('lead-notes-' + id).value.trim();
        const { error } = await supabaseClient.client.from('leads').update({ assignor_notes: notes }).eq('id', id);
        if (!error) {
            const msg = document.getElementById('lead-save-msg-' + id);
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 2500);
        }
    }

    async function acknowledgeLead(id) {
        alert('[ack] function reached, id = ' + id);
        try {
            const { error } = await supabaseClient.client.from('leads').update({ acknowledged: true }).eq('id', id);
            alert('[ack] done, error = ' + JSON.stringify(error));
        } catch(e) { alert('[ack] exception: ' + e); }
        const btn = document.querySelector(`button[onclick="acknowledgeLead(${id})"]`);
        if (btn) btn.outerHTML = `<span style="font-size:0.78rem; font-weight:700; color:#27ae60;">✓ Acknowledged</span>`;
        const dot = document.getElementById('lead-dot-' + id);
        if (dot) { dot.className = 'empty-dot'; }
        // Signal admin.html to hide the dot on next load
    }

    async function archiveLead(id) {
        if (!confirm('Archive this lead?')) return;
        await supabaseClient.client.from('leads').update({ archived: true }).eq('id', id);
        document.getElementById('lead-row-' + id).remove();
        const remaining = document.getElementById('leadsList').children.length;
        if (remaining === 0) document.getElementById('leadsEmpty').style.display = 'block';
    }

    loadLeads();
</script>
</body>
</html>
