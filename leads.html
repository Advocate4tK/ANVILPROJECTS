<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referee Tool — Leads</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }
        .logo-mark { --sz:72px; position:relative; width:var(--sz); height:var(--sz); flex-shrink:0; }
        .lcard { position:absolute; border-radius:calc(var(--sz)*0.065); }
        .lcard-red { width:calc(var(--sz)*0.58); height:calc(var(--sz)*0.82); background:linear-gradient(145deg,#f87171 0%,#ef4444 55%,#b91c1c 100%); box-shadow:0 calc(var(--sz)*0.02) calc(var(--sz)*0.12) rgba(239,68,68,0.45); top:calc(var(--sz)*0.21); left:calc(var(--sz)*0.32); transform:rotate(22deg); }
        .lcard-yellow { width:calc(var(--sz)*0.64); height:calc(var(--sz)*0.88); background:linear-gradient(145deg,#fde047 0%,#f59e0b 55%,#b45309 100%); box-shadow:0 0 calc(var(--sz)*0.2) rgba(245,158,11,0.6),0 0 calc(var(--sz)*0.4) rgba(245,158,11,0.2),0 calc(var(--sz)*0.05) calc(var(--sz)*0.18) rgba(0,0,0,0.5); top:calc(var(--sz)*0.12); left:calc(var(--sz)*0.18); transform:rotate(10deg); }
        .lcard-yellow::before { content:''; position:absolute; top:8%; left:10%; width:14%; height:52%; background:linear-gradient(180deg,rgba(255,255,255,0.38) 0%,rgba(255,255,255,0) 100%); border-radius:3px; }
        .logo-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:calc(var(--sz)*0.10); font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; text-align:center; z-index:10; line-height:0.88; letter-spacing:2px; }
        .logo-line1 { color:#fff; font-size:calc(var(--sz)*0.2); text-shadow:0 2px 12px rgba(0,0,0,0.95); }
        .logo-line2 { color:#00c853; font-size:calc(var(--sz)*0.32); text-shadow:0 2px 12px rgba(0,0,0,0.95); margin-top:calc(var(--sz)*-0.01); transform:skewX(-14deg); display:block; }
        .logo-underline { display:block; height:calc(var(--sz)*0.022); width:calc(var(--sz)*0.58); margin-top:calc(var(--sz)*0.025); background:#ef4444; border-radius:calc(var(--sz)*0.01); box-shadow:0 0 calc(var(--sz)*0.04) rgba(239,68,68,0.85); transform:skewX(-14deg); }

        .leads-wrap { max-width:880px; margin:0 auto; padding:0 20px 60px; }

        .lead-row { border:1px solid #e2d9ce; border-radius:8px; overflow:hidden; background:#fff; margin-bottom:8px; }
        .lead-row-header { display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; user-select:none; }
        .lead-row-header:hover { background:#fafaf8; }
        .lead-expand { display:none; padding:18px 20px; border-top:1px solid #e2d9ce; font-size:0.88rem; color:#444; line-height:1.6; }

        .status-pill { display:inline-block; font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:0.72rem; text-transform:uppercase; letter-spacing:1px; border-radius:20px; padding:2px 10px; }
        .status-open { background:#dbeafe; color:#1d4ed8; }
        .status-warm { background:#fef3c7; color:#b45309; }
        .status-dead { background:#f3f4f6; color:#9ca3af; }

        .followup-badge { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.5px; color:#6b7280; }
        .followup-badge.overdue { color:#dc2626; font-weight:800; }

        .lead-field-label { font-weight:700; color:#09142a; }
        .lead-message { background:#f8f7f4; border-left:3px solid #e2d9ce; padding:10px 14px; border-radius:0 6px 6px 0; font-size:0.875rem; color:#444; line-height:1.65; margin-bottom:0; }

        .section-label { font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:1px; color:#aaa; margin-bottom:8px; }

        .note-entry { padding:9px 13px; background:#f8f7f4; border-radius:6px; margin-bottom:5px; }
        .note-meta { font-size:0.74rem; color:#999; margin-bottom:2px; }
        .note-text { font-size:0.875rem; color:#09142a; }
        .note-empty { font-size:0.83rem; color:#bbb; font-style:italic; padding:4px 0 10px; }

        .add-note-row { display:flex; gap:8px; }
        .note-input { flex:1; font-family:'DM Sans',sans-serif; font-size:0.875rem; padding:8px 12px; border:2px solid #e2d9ce; border-radius:6px; outline:none; color:#09142a; transition:border-color 0.2s; }
        .note-input:focus { border-color:#09142a; }
        .btn-add { background:#09142a; color:#fff; border:none; border-radius:6px; padding:8px 18px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; cursor:pointer; }

        .meta-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
        .meta-field { display:flex; align-items:center; gap:8px; font-size:0.84rem; }
        .status-select { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.88rem; padding:4px 10px; border:2px solid #e2d9ce; border-radius:6px; outline:none; cursor:pointer; background:#fff; color:#09142a; }
        .date-input { font-family:'DM Sans',sans-serif; font-size:0.84rem; padding:4px 10px; border:2px solid #e2d9ce; border-radius:6px; outline:none; color:#09142a; }
        .btn-clear { background:none; border:none; color:#bbb; cursor:pointer; font-size:0.8rem; padding:0; }

        .action-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
        .btn-fullpage { background:#f0ece6; color:#09142a; border:1px solid #e2d9ce; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; text-decoration:none; display:inline-block; }
        .btn-archive { background:#fef3c7; color:#b45309; border:none; border-radius:6px; padding:7px 16px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; text-transform:uppercase; cursor:pointer; margin-left:auto; }

        .new-dot { display:inline-block; width:8px; height:8px; background:#e94560; border-radius:50%; flex-shrink:0; }
        .empty-dot { display:inline-block; width:8px; height:8px; flex-shrink:0; }
        .divider { border:none; border-top:1px solid #eee; margin:16px 0; }
    </style>
</head>
<body>
<div class="container">

    <header style="position:relative;">
        <div class="header-brand" style="display:inline-flex; align-items:center; gap:16px; justify-content:center;">
            <div class="logo-mark">
                <div class="lcard lcard-red"></div>
                <div class="lcard lcard-yellow"></div>
                <div class="logo-text">
                    <span class="logo-line1">Referee</span>
                    <span class="logo-line2">Tool</span>
                    <span class="logo-underline"></span>
                </div>
            </div>
            <h1 style="margin:0;">Leads &amp; Sales</h1>
        </div>
        <p class="subtitle">Demo inquiries from referee-tool.com</p>
    </header>

    <main>
        <div class="leads-wrap">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                <a href="admin.html" style="background:#00c853; color:#09142a; font-family:'Barlow Condensed',sans-serif; font-size:0.95rem; font-weight:800; text-transform:uppercase; padding:8px 18px; border-radius:8px; text-decoration:none;">← Back to Admin Portal</a>
                <div style="font-family:'Barlow Condensed',sans-serif; font-size:0.85rem; color:rgba(255,255,255,0.5);" id="leadCount"></div>
            </div>
            <div id="leadsLoading" style="color:rgba(255,255,255,0.4); text-align:center; padding:60px 0; font-size:0.9rem;">Loading…</div>
            <div id="leadsEmpty" style="display:none; color:rgba(255,255,255,0.4); text-align:center; padding:60px 0; font-size:0.9rem;">No inquiries yet.</div>
            <div id="leadsList"></div>
        </div>
    </main>

</div>

<script src="config.js"></script>
<script src="js/admin-auth.js"></script>
<script>checkAdminAccess();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js?v=12"></script>
<script>
    let currentUserName = 'Tod';

    async function init() {
        const uid = currentUserId();
        if (uid) {
            const { data } = await supabaseClient.client
                .from('assignor_profiles').select('username').eq('id', uid).maybeSingle();
            if (data?.username) currentUserName = data.username;
        }
        loadLeads();
    }

    function parseNotes(raw) {
        if (!raw) return [];
        try {
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed)) return parsed;
        } catch(e) {}
        return [{ text: raw, ts: null, by: '' }];
    }

    function fmtTs(ts) {
        if (!ts) return '';
        return new Date(ts).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    }

    function statusPillHtml(status) {
        const map = { warm: ['status-warm','Warm'], dead: ['status-dead','Dead'], open: ['status-open','Open'] };
        const [cls, label] = map[status] || map.open;
        return `<span class="status-pill ${cls}">${label}</span>`;
    }

    function followupBadgeHtml(dateStr) {
        if (!dateStr) return '';
        const today = new Date().toISOString().slice(0,10);
        const overdue = dateStr < today;
        const label = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' });
        return `<span class="followup-badge${overdue ? ' overdue' : ''}">↻ ${label}${overdue ? ' ⚠' : ''}</span>`;
    }

    function notesListHtml(notes) {
        if (!notes.length) return `<div class="note-empty">No notes yet.</div>`;
        return notes.map(n => `
            <div class="note-entry">
                <div class="note-meta">${[fmtTs(n.ts), n.by].filter(Boolean).join(' — ')}</div>
                <div class="note-text">${(n.text || '').replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>
            </div>`).join('');
    }

    async function loadLeads() {
        const { data, error } = await supabaseClient.client
            .from('leads').select('*').eq('archived', false)
            .order('created_at', { ascending: false });

        document.getElementById('leadsLoading').style.display = 'none';
        if (error || !data || !data.length) {
            document.getElementById('leadsEmpty').style.display = 'block';
            return;
        }

        const newCount = data.filter(l => !l.acknowledged).length;
        document.getElementById('leadCount').textContent =
            data.length + ' lead' + (data.length !== 1 ? 's' : '') +
            (newCount ? ' · ' + newCount + ' new' : '');

        document.getElementById('leadsList').innerHTML = data.map(l => {
            const ts = new Date(l.created_at).toLocaleString('en-US', {
                month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit'
            });
            const dot    = !l.acknowledged ? `<span class="new-dot" id="lead-dot-${l.id}"></span>` : `<span class="empty-dot" id="lead-dot-${l.id}"></span>`;
            const status = l.status || 'open';
            const notes  = parseNotes(l.assignor_notes);

            return `
            <div class="lead-row" id="lead-row-${l.id}">
                <div class="lead-row-header" onclick="toggleLead(${l.id})">
                    ${dot}
                    <div style="flex:1; min-width:0;">
                        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                            <span style="font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:1rem; color:#09142a; text-transform:uppercase; letter-spacing:0.5px;">${l.name}</span>
                            <span id="status-pill-${l.id}">${statusPillHtml(status)}</span>
                            <span id="followup-badge-${l.id}">${followupBadgeHtml(l.follow_up_date)}</span>
                        </div>
                        <div style="font-size:0.78rem; color:#888; margin-top:2px;">
                            ${l.club} ·
                            <a href="mailto:${l.email}" onclick="event.stopPropagation();" style="color:#888; text-decoration:none;">${l.email}</a>
                            ${l.phone ? ` · <a href="tel:${l.phone}" onclick="event.stopPropagation();" style="color:#888; text-decoration:none;">${l.phone}</a>` : ''}
                            · ${ts}
                        </div>
                    </div>
                    <span id="lead-chevron-${l.id}" style="font-size:0.75rem; color:#aaa; flex-shrink:0;">▼</span>
                </div>
                <div class="lead-expand" id="lead-detail-${l.id}">

                    <!-- Contact info + message -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:4px 24px; margin-bottom:12px; font-size:0.875rem;">
                        <div><span class="lead-field-label">Role:</span> ${l.role || '—'}</div>
                        <div><span class="lead-field-label">Club:</span> ${l.club || '—'}</div>
                    </div>
                    <div class="section-label">Their Message</div>
                    <div class="lead-message">${l.message ? l.message.replace(/</g,'&lt;').replace(/\n/g,'<br>') : '—'}</div>

                    <hr class="divider">

                    <!-- Status + follow-up -->
                    <div class="meta-row" style="margin-bottom:16px;">
                        <div class="meta-field">
                            <span class="section-label" style="margin-bottom:0;">Status</span>
                            <select class="status-select" id="status-select-${l.id}" onchange="saveStatus(${l.id})" onclick="event.stopPropagation()">
                                <option value="open" ${status==='open'?'selected':''}>Open</option>
                                <option value="warm" ${status==='warm'?'selected':''}>Warm</option>
                                <option value="dead" ${status==='dead'?'selected':''}>Dead</option>
                            </select>
                        </div>
                        <div class="meta-field">
                            <span class="section-label" style="margin-bottom:0;">Follow Up</span>
                            <input type="date" class="date-input" id="followup-${l.id}"
                                   value="${l.follow_up_date || ''}"
                                   onchange="saveFollowup(${l.id})"
                                   onclick="event.stopPropagation()">
                            <button class="btn-clear" id="followup-clear-${l.id}"
                                    style="${l.follow_up_date ? '' : 'display:none;'}"
                                    onclick="clearFollowup(${l.id}); event.stopPropagation();">✕</button>
                        </div>
                    </div>

                    <hr class="divider">

                    <!-- Activity log -->
                    <div class="section-label">Activity</div>
                    <div id="notes-list-${l.id}">${notesListHtml(notes)}</div>
                    <div class="add-note-row" style="margin-top:8px;">
                        <input type="text" class="note-input" id="note-input-${l.id}"
                               placeholder="Add a note…"
                               onkeydown="if(event.key==='Enter'){ addNote(${l.id}); event.preventDefault(); }">
                        <button class="btn-add" onclick="addNote(${l.id})">Add</button>
                    </div>

                    <hr class="divider">

                    <div class="action-row">
                        <a class="btn-fullpage" href="lead-detail.html?id=${l.id}" target="_blank">Full Page ↗</a>
                        <button class="btn-archive" onclick="archiveLead(${l.id})">Archive</button>
                    </div>
                </div>
            </div>`;
        }).join('');

        // Auto-acknowledge all on page load
        supabaseClient.client.from('leads').update({ viewed: true, acknowledged: true }).eq('archived', false).then(() => {
            data.forEach(l => {
                const dot = document.getElementById('lead-dot-' + l.id);
                if (dot) dot.className = 'empty-dot';
            });
        });
    }

    function toggleLead(id) {
        const detail  = document.getElementById('lead-detail-' + id);
        const chevron = document.getElementById('lead-chevron-' + id);
        const open    = detail.style.display !== 'block';
        detail.style.display = open ? 'block' : 'none';
        chevron.textContent  = open ? '▲' : '▼';
    }

    async function addNote(id) {
        const input = document.getElementById('note-input-' + id);
        const text  = input.value.trim();
        if (!text) return;
        const { data } = await supabaseClient.client.from('leads').select('assignor_notes').eq('id', id).single();
        const notes = parseNotes(data?.assignor_notes);
        notes.push({ text, ts: new Date().toISOString(), by: currentUserName });
        await supabaseClient.client.from('leads').update({ assignor_notes: JSON.stringify(notes) }).eq('id', id);
        document.getElementById('notes-list-' + id).innerHTML = notesListHtml(notes);
        input.value = '';
        input.focus();
    }

    async function saveStatus(id) {
        const status = document.getElementById('status-select-' + id).value;
        await supabaseClient.client.from('leads').update({ status }).eq('id', id);
        document.getElementById('status-pill-' + id).innerHTML = statusPillHtml(status);
    }

    async function saveFollowup(id) {
        const dateVal = document.getElementById('followup-' + id).value || null;
        await supabaseClient.client.from('leads').update({ follow_up_date: dateVal }).eq('id', id);
        document.getElementById('followup-badge-' + id).innerHTML = followupBadgeHtml(dateVal);
        document.getElementById('followup-clear-' + id).style.display = dateVal ? '' : 'none';
    }

    async function clearFollowup(id) {
        document.getElementById('followup-' + id).value = '';
        await supabaseClient.client.from('leads').update({ follow_up_date: null }).eq('id', id);
        document.getElementById('followup-badge-' + id).innerHTML = '';
        document.getElementById('followup-clear-' + id).style.display = 'none';
    }

    async function archiveLead(id) {
        if (!confirm('Archive this lead?')) return;
        await supabaseClient.client.from('leads').update({ archived: true }).eq('id', id);
        document.getElementById('lead-row-' + id).remove();
        if (!document.getElementById('leadsList').children.length)
            document.getElementById('leadsEmpty').style.display = 'block';
    }

    init();
</script>
</body>
</html>
