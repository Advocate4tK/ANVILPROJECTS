<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Games</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .drop-zone {
            border: 3px dashed #3498db;
            border-radius: 10px;
            padding: 50px 20px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            transition: background 0.2s, border-color 0.2s;
            margin-bottom: 20px;
        }
        .drop-zone.dragover {
            background: #d6eaf8;
            border-color: #1a6fa8;
        }
        .drop-zone p { margin: 8px 0; color: #555; }
        .drop-zone .drop-icon { font-size: 48px; }

        #fileInput { display: none; }

        .preview-section { margin-top: 30px; }
        .preview-table-wrap { overflow-x: auto; margin-top: 15px; }
        .preview-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .preview-table th {
            background: #2c3e50;
            color: white;
            padding: 8px 12px;
            text-align: left;
            white-space: nowrap;
        }
        .preview-table td {
            padding: 7px 12px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        .preview-table tr:nth-child(even) { background: #f5f5f5; }
        .preview-table tr.row-success { background: #d5f5e3; }
        .preview-table tr.row-error { background: #fadbd8; }
        .preview-table tr.row-skipped { background: #fef9e7; }

        .upload-actions { margin-top: 20px; display: flex; gap: 12px; align-items: center; }

        .progress-bar-wrap {
            background: #ecf0f1;
            border-radius: 8px;
            height: 20px;
            margin-top: 15px;
            overflow: hidden;
            display: none;
        }
        .progress-bar {
            height: 100%;
            background: #27ae60;
            width: 0%;
            transition: width 0.3s;
        }

        .results-section { margin-top: 20px; }
        .result-item {
            padding: 8px 14px;
            border-radius: 5px;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .result-item.success { background: #d5f5e3; color: #1e8449; }
        .result-item.error { background: #fadbd8; color: #922b21; }
        .result-item.skipped { background: #fef9e7; color: #9a7d0a; }

        .summary-box {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .summary-box.all-good { background: #d5f5e3; color: #1e8449; }
        .summary-box.some-errors { background: #fdebd0; color: #935116; }
        .summary-box.all-errors { background: #fadbd8; color: #922b21; }

        .template-link { font-size: 14px; color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Upload Games</h1>
            <p class="subtitle">Import your game schedule from a CSV file into Airtable</p>
        </header>

        <main>
            <!-- Drop Zone -->
            <div class="form-container">
                <div class="drop-zone" id="dropZone">
                    <div class="drop-icon">📂</div>
                    <p><strong>Drag & drop your CSV file here</strong></p>
                    <p>or</p>
                    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Browse File</button>
                    <input type="file" id="fileInput" accept=".csv">
                    <p style="margin-top:15px;">
                        <a href="games-upload-template.csv" download class="template-link">⬇ Download CSV Template</a>
                    </p>
                </div>

                <!-- Progress -->
                <div class="progress-bar-wrap" id="progressWrap">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <p id="progressText" style="display:none; text-align:center; font-size:14px; color:#555;"></p>

                <!-- Preview -->
                <div class="preview-section" id="previewSection" style="display:none;">
                    <h3 id="previewTitle">Preview</h3>
                    <p id="previewCount" style="color:#555; font-size:14px;"></p>
                    <div class="preview-table-wrap">
                        <table class="preview-table" id="previewTable"></table>
                    </div>
                    <div class="upload-actions">
                        <button class="btn btn-primary btn-large" id="uploadBtn">Upload to Airtable</button>
                        <button class="btn btn-outline" id="clearBtn">Clear</button>
                    </div>
                </div>

                <!-- Results -->
                <div class="results-section" id="resultsSection" style="display:none;">
                    <h3>Upload Results</h3>
                    <div id="summaryBox" class="summary-box"></div>
                    <div id="resultsList"></div>
                </div>
            </div>

            <!-- Submission History -->
            <div id="submissionHistory" style="margin-top:28px; display:none;">
                <h2 style="color:#0f3460; font-size:1.1rem; margin-bottom:14px;">📋 Submitted Games</h2>
                <div id="historyContent"></div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Referee Scheduling System by Anvil Arts</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="js/airtable-client.js"></script>
    <script src="js/game-upload.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        emailjs.init('p0JPOZ4XKJ86egvTB');

        // ── Submission History (localStorage, 2-week retention) ──────────────
        const HISTORY_KEY = 'gameUploadHistory';
        const TWO_WEEKS_MS = 14 * 24 * 60 * 60 * 1000;

        function loadHistory() {
            try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch(e) { return []; }
        }

        function saveHistory(history) {
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
        }

        function pruneHistory(history) {
            const cutoff = Date.now() - TWO_WEEKS_MS;
            return history.filter(g => g.submittedAt >= cutoff);
        }

        function getWeekKey(dateStr) {
            // Returns the Monday of the week containing dateStr
            const d = new Date(dateStr + 'T00:00:00');
            const day = d.getDay(); // 0=Sun
            const diff = day === 0 ? -6 : 1 - day;
            const mon = new Date(d); mon.setDate(d.getDate() + diff);
            const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
            const fmt = d => d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
            return { key: mon.toISOString().split('T')[0], label: `Week of ${fmt(mon)} – ${fmt(sun)}` };
        }

        function renderHistory() {
            const history = pruneHistory(loadHistory());
            saveHistory(history); // prune stale entries
            const wrap = document.getElementById('submissionHistory');
            const content = document.getElementById('historyContent');
            if (history.length === 0) { wrap.style.display = 'none'; return; }

            // Group by week
            const weeks = {};
            history.forEach(g => {
                const { key, label } = getWeekKey(g.date || g.submittedAt ? new Date(g.submittedAt).toISOString().split('T')[0] : '');
                if (!weeks[key]) weeks[key] = { label, games: [] };
                weeks[key].games.push(g);
            });

            // Sort weeks descending (most recent first)
            const sortedWeeks = Object.entries(weeks).sort((a, b) => b[0].localeCompare(a[0]));

            content.innerHTML = sortedWeeks.map(([, { label, games }]) => {
                const rows = games
                    .sort((a, b) => (a.date || '').localeCompare(b.date || '') || (a.time || '').localeCompare(b.time || ''))
                    .map(g => `
                        <tr>
                            <td style="padding:7px 12px; border-bottom:1px solid #f0f0f0; white-space:nowrap;">${g.date || '—'}</td>
                            <td style="padding:7px 12px; border-bottom:1px solid #f0f0f0; white-space:nowrap;">${g.time || '—'}</td>
                            <td style="padding:7px 12px; border-bottom:1px solid #f0f0f0;">${g.home || '—'} vs ${g.away || '—'}</td>
                            <td style="padding:7px 12px; border-bottom:1px solid #f0f0f0; white-space:nowrap;">${g.age || '—'}</td>
                            <td style="padding:7px 12px; border-bottom:1px solid #f0f0f0;">
                                <span style="background:#d5f5e3; color:#1e8449; font-size:0.75rem; font-weight:700; padding:2px 8px; border-radius:10px;">SUBMITTED</span>
                            </td>
                        </tr>`).join('');
                return `
                    <div style="margin-bottom:18px;">
                        <div style="font-size:0.8rem; font-weight:700; color:#0f3460; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; padding-bottom:4px; border-bottom:2px solid #e94560;">${label}</div>
                        <table style="width:100%; border-collapse:collapse; font-size:0.85rem; background:white; border-radius:8px; overflow:hidden; box-shadow:0 1px 6px rgba(0,0,0,0.06);">
                            <thead>
                                <tr style="background:#0f3460; color:white;">
                                    <th style="padding:7px 12px; text-align:left; font-weight:600;">Date</th>
                                    <th style="padding:7px 12px; text-align:left; font-weight:600;">Time</th>
                                    <th style="padding:7px 12px; text-align:left; font-weight:600;">Matchup</th>
                                    <th style="padding:7px 12px; text-align:left; font-weight:600;">Age</th>
                                    <th style="padding:7px 12px; text-align:left; font-weight:600;">Status</th>
                                </tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>`;
            }).join('');

            wrap.style.display = 'block';
        }

        function addGamesToHistory(uploadedByClub) {
            const history = pruneHistory(loadHistory());
            const now = Date.now();
            Object.values(uploadedByClub).forEach(games => {
                games.forEach(gameStr => {
                    // gameStr format: "2026-03-22 09:00 — Home vs Away (U10)"
                    const match = gameStr.match(/^(\S+)\s+(\S+)\s+—\s+(.+)\s+vs\s+(.+)\s+\((.+)\)$/);
                    if (match) {
                        history.push({ date: match[1], time: match[2], home: match[3].trim(), away: match[4].trim(), age: match[5].trim(), submittedAt: now });
                    } else {
                        history.push({ date: '', time: '', home: gameStr, away: '', age: '', submittedAt: now });
                    }
                });
            });
            saveHistory(history);
            renderHistory();
        }

        // Render history on page load
        renderHistory();

        document.addEventListener('uploadComplete', function(e) {
            const { uploadedByClub, clubEmailMap } = e.detail;
            addGamesToHistory(uploadedByClub);
            Object.entries(uploadedByClub).forEach(([clubName, games]) => {
                const clubKey = clubName.toLowerCase();
                const toEmail = clubEmailMap[clubKey]
                    || Object.entries(clubEmailMap).find(([k]) => clubKey.includes(k) || k.includes(clubKey))?.[1];
                if (!toEmail) {
                    console.warn(`No email on file for ${clubName} — skipping confirmation`);
                    return;
                }
                const gameList = games.map((g, i) => `${i + 1}. ${g}`).join('\n');
                emailjs.send('nectassignor@gmail.com', 'template_game_confirm', {
                    to_email:   toEmail,
                    club_name:  clubName,
                    game_count: games.length,
                    game_list:  gameList,
                }).then(function() {
                    console.log(`Confirmation sent to ${toEmail} for ${clubName}`);
                }, function(err) {
                    console.error(`Failed to send to ${toEmail}:`, err);
                });
            });
        });
    </script>
</body>
</html>
