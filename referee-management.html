<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referee Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        table { width:100%; border-collapse:collapse; font-size:0.9rem; }
        th { background:#0f3460; color:white; padding:10px 12px; text-align:left; font-weight:600; }
        td { padding:9px 12px; border-bottom:1px solid #e0e0e0; vertical-align:middle; }
        tr:hover td { background:#f8f9ff; }
        .edit-field { display:flex; gap:6px; align-items:center; }
        .edit-input { border:1px solid #ccc; border-radius:6px; padding:5px 8px; font-size:0.85rem; width:160px; font-family:inherit; }
        .edit-input:focus { outline:none; border-color:#e94560; box-shadow:0 0 0 2px rgba(233,69,96,0.1); }
        .save-btn { background:#27ae60; color:white; border:none; border-radius:6px; padding:5px 10px; font-size:0.8rem; cursor:pointer; font-weight:600; white-space:nowrap; }
        .save-btn:hover { background:#1e8449; }
        .saved-badge { color:#27ae60; font-size:0.8rem; font-weight:600; display:none; }
        .cert-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.78rem; font-weight:600; background:#e8f0fe; color:#0f3460; }
        .status-active { color:#27ae60; font-weight:600; }
        .ca-set { color:#0f3460; font-weight:600; }
        .ca-missing { color:#aaa; font-style:italic; }
        .search-bar { display:flex; gap:12px; margin-bottom:16px; align-items:center; flex-wrap:wrap; }
        .search-bar input { padding:9px 14px; border:1px solid #ccc; border-radius:8px; font-size:0.9rem; width:280px; font-family:inherit; }
        .search-bar input:focus { outline:none; border-color:#e94560; }
        .count-badge { font-size:0.85rem; color:#555; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔐 Admin Portal</h1>
            <p class="subtitle">Referee Management</p>
        </header>

        <main>
            <div style="margin-bottom:20px;">
                <a href="ca-import.html" class="btn btn-outline" style="font-size:0.85rem; padding:8px 16px;">← Back to CA Administration</a>
            </div>

            <div style="background:white; border-radius:12px; padding:28px; box-shadow:0 4px 15px rgba(0,0,0,0.07); border-top:4px solid #e94560;">
                <h2 style="color:#0f3460; margin-bottom:6px;">👤 Referee Roster</h2>
                <p style="color:#666; font-size:0.9rem; margin-bottom:20px;">
                    Set each referee's <strong>Central Assign Name</strong> and <strong>Central Assign ID</strong> to ensure game exports match Central Assign's database exactly.
                </p>

                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search by name or email...">
                    <span id="countBadge" class="count-badge"></span>
                </div>

                <div id="tableWrap">
                    <p style="color:#888;">Loading referees...</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Referee Scheduling System by Anvil Arts</p>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="js/airtable-client.js"></script>
    <script src="js/admin-auth.js"></script>
    <script>
        checkAdminAccess();

        let allReferees = [];

        async function loadReferees() {
            const wrap = document.getElementById('tableWrap');
            try {
                allReferees = await airtableClient.getRecords(CONFIG.AIRTABLE_TABLES.REFEREES, {
                    maxRecords: 1000,
                    sort: [{ field: 'Name', direction: 'asc' }]
                });
                renderTable(allReferees);
            } catch(e) {
                wrap.innerHTML = `<p style="color:#e74c3c;">Failed to load referees: ${e.message}</p>`;
            }
        }

        function renderTable(refs) {
            const wrap = document.getElementById('tableWrap');
            document.getElementById('countBadge').textContent = `${refs.length} referee${refs.length !== 1 ? 's' : ''}`;

            if (!refs.length) {
                wrap.innerHTML = '<p style="color:#888;">No referees found.</p>';
                return;
            }

            let html = `<div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Cert Level</th>
                        <th>Status</th>
                        <th>Central Assign Name</th>
                        <th>Central Assign ID</th>
                    </tr>
                </thead>
                <tbody>`;

            refs.forEach(ref => {
                const f  = ref.fields;
                const id = ref.id;
                const name    = f['Name'] || '—';
                const email   = f['Email'] || '—';
                const cert    = f['Certification Level'] || '';
                const status  = f['Status'] || 'Active';
                const caName  = f['Central Assign Name'] || '';
                const caId    = f['Central Assign ID'] || '';

                html += `<tr>
                    <td><strong>${name}</strong></td>
                    <td style="color:#555;">${email}</td>
                    <td>${cert ? `<span class="cert-badge">${cert}</span>` : '<span style="color:#aaa;">—</span>'}</td>
                    <td class="status-active">${status}</td>
                    <td>
                        <div class="edit-field">
                            <input class="edit-input" id="caName-${id}" value="${caName}" placeholder="e.g. Benjamin Smith">
                            <button class="save-btn" onclick="saveRef('${id}')">Save</button>
                            <span class="saved-badge" id="saved-${id}">✓ Saved</span>
                        </div>
                    </td>
                    <td>
                        <div class="edit-field">
                            <input class="edit-input" id="caId-${id}" value="${caId}" placeholder="e.g. 12345" style="width:110px;">
                        </div>
                    </td>
                </tr>`;
            });

            html += `</tbody></table></div>`;
            wrap.innerHTML = html;

            // Allow Enter key to save
            refs.forEach(ref => {
                const id = ref.id;
                ['caName-' + id, 'caId-' + id].forEach(elId => {
                    const el = document.getElementById(elId);
                    if (el) el.addEventListener('keydown', e => { if (e.key === 'Enter') saveRef(id); });
                });
            });
        }

        async function saveRef(recordId) {
            const caName = document.getElementById(`caName-${recordId}`).value.trim();
            const caId   = document.getElementById(`caId-${recordId}`).value.trim();
            const badge  = document.getElementById(`saved-${recordId}`);

            try {
                await airtableClient.updateRecord(CONFIG.AIRTABLE_TABLES.REFEREES, recordId, {
                    'Central Assign Name': caName,
                    'Central Assign ID':   caId
                });
                badge.style.display = 'inline';
                setTimeout(() => { badge.style.display = 'none'; }, 2000);
            } catch(e) {
                alert(`Failed to save: ${e.message}`);
            }
        }

        // Search filter
        document.addEventListener('DOMContentLoaded', function() {
            loadReferees();
            document.getElementById('searchInput').addEventListener('input', function() {
                const q = this.value.toLowerCase();
                const filtered = allReferees.filter(r => {
                    const name  = (r.fields['Name']  || '').toLowerCase();
                    const email = (r.fields['Email'] || '').toLowerCase();
                    return name.includes(q) || email.includes(q);
                });
                renderTable(filtered);
            });
        });
    </script>
</body>
</html>
