<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ref Availability Tools — Referee Tool</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }
        .tools-wrap { max-width: 720px; margin: 0 auto; padding: 0 20px 60px; }
        .page-header {
            display: flex; align-items: center; gap: 14px;
            padding: 28px 0 22px;
        }
        .page-header a {
            color: rgba(255,255,255,0.5); font-size: 0.82rem; font-weight: 600;
            text-decoration: none; white-space: nowrap;
        }
        .page-header a:hover { color: white; }
        .page-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.9rem; font-weight: 800; color: white;
            letter-spacing: 0.5px; text-transform: uppercase; margin: 0;
        }
        .tool-section {
            background: white; border-radius: 12px; padding: 26px 30px;
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.12);
        }
        .tool-section h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem; font-weight: 800; color: #09142a;
            text-transform: uppercase; letter-spacing: 0.5px;
            margin: 0 0 6px;
        }
        .tool-section p {
            font-size: 0.85rem; color: #666; margin: 0 0 18px;
        }
        .club-check-list {
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
        }
        .club-check-list label {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.92rem; color: #1f2328; cursor: pointer;
            padding: 8px 12px; border-radius: 8px; border: 1px solid #e2d9ce;
            transition: background 0.15s;
        }
        .club-check-list label:hover { background: #f6f8fa; }
        .club-check-list input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #1a6b3a; }
        .save-btn {
            background: #1a6b3a; color: white; border: none; border-radius: 8px;
            padding: 10px 28px; font-size: 0.9rem; font-weight: 700;
            font-family: inherit; cursor: pointer; transition: background 0.15s;
        }
        .save-btn:hover { background: #155c30; }
        .save-msg {
            display: none; margin-left: 14px; font-size: 0.82rem;
            color: #1a6b3a; font-weight: 700;
        }
    </style>
</head>
<body>
<div class="tools-wrap">
    <div class="page-header">
        <a href="admin.html">← Admin Portal</a>
        <h1 class="page-title">Ref Availability Tools</h1>
    </div>

    <!-- Openings Board -->
    <div class="tool-section">
        <h2>Public Openings Board</h2>
        <p>Select which clubs appear on the public referee openings board at ref-openings.html</p>
        <div class="club-check-list" id="openingsClubChecks"></div>
        <div style="display:flex; align-items:center;">
            <button class="save-btn" onclick="saveOpeningsClubs()">Save</button>
            <span class="save-msg" id="openingsSaveMsg">Saved</span>
        </div>
    </div>

</div>

<script src="js/supabase-client.js"></script>
<script src="js/admin-auth.js?v=8"></script>
<script>
    const OPENINGS_ALL_CLUBS = ['Griswold', 'East Haddam', 'RHAMYS', 'Lebanon', 'WAM', 'Plainfield', 'NECONN'];

    async function loadOpeningsClubs() {
        const res = await supabaseClient.client
            .from('settings').select('value').eq('key', 'openings_clubs').maybeSingle();
        let active = [];
        try { active = JSON.parse(res.data?.value || '[]'); } catch(e) {}
        const wrap = document.getElementById('openingsClubChecks');
        wrap.innerHTML = OPENINGS_ALL_CLUBS.map(club => `
            <label>
                <input type="checkbox" value="${club}" ${active.includes(club) ? 'checked' : ''}>
                ${club}
            </label>`).join('');
    }

    async function saveOpeningsClubs() {
        const checks = document.querySelectorAll('#openingsClubChecks input[type=checkbox]');
        const selected = [...checks].filter(c => c.checked).map(c => c.value);
        await supabaseClient.client.from('settings')
            .update({ value: JSON.stringify(selected) }).eq('key', 'openings_clubs');
        const msg = document.getElementById('openingsSaveMsg');
        msg.style.display = 'inline';
        setTimeout(() => msg.style.display = 'none', 2000);
    }

    window.addEventListener('load', () => { loadOpeningsClubs(); });
</script>
</body>
</html>
