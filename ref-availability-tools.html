<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ref Availability Tools — Referee Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }
        .club-check-list {
            display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;
        }
        .club-check-list label {
            display: flex; align-items: center; gap: 10px;
            font-size: 0.92rem; color: #1f2328; cursor: pointer;
            padding: 9px 14px; border-radius: 8px; border: 1px solid #e2d9ce;
            transition: background 0.15s; font-family: 'DM Sans', sans-serif;
        }
        .club-check-list label:hover { background: #f6f8fa; }
        .club-check-list input[type=checkbox] {
            width: 18px; height: 18px; cursor: pointer; accent-color: #09142a;
        }
        .save-msg {
            display: none; margin-left: 14px; font-size: 0.82rem;
            color: #1a6b3a; font-weight: 700; font-family: 'DM Sans', sans-serif;
        }
        .tool-card {
            background: white; border-radius: 12px; padding: 28px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            border-top: 4px solid #09142a; margin-bottom: 20px;
        }
        .tool-card h2 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.3rem; font-weight: 800; color: #09142a;
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
        }
        .tool-card p {
            font-size: 0.84rem; color: #888; margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📋 Ref Availability Tools</h1>
        <p class="subtitle">Manage referee availability settings and the public openings board</p>
    </header>

    <main>
        <div style="margin-bottom:20px;">
            <a href="admin.html" class="btn-back">← Back to Admin Portal</a>
        </div>

        <!-- Openings Board -->
        <div class="tool-card">
            <h2>Public Openings Board</h2>
            <p style="margin-bottom:14px;">Select which clubs appear on the public referee openings board</p>
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                <button onclick="navigator.clipboard.writeText('https://referee-tool.com/ref-openings.html').then(()=>{ this.textContent='✅ Copied!'; setTimeout(()=>this.textContent='📋 Copy Link',1500); })"
                    style="background:#e8f4fd; border:1px solid #3498db; color:#3498db; border-radius:6px; padding:4px 10px; font-size:0.78rem; cursor:pointer; white-space:nowrap; font-family:inherit;">📋 Copy Link</button>
                <a href="https://referee-tool.com/ref-openings.html" target="_blank"
                    style="background:#eafaf1; border:1px solid #27ae60; color:#27ae60; border-radius:6px; padding:4px 10px; font-size:0.78rem; text-decoration:none; white-space:nowrap;">↗ Open</a>
            </div>
            <div class="club-check-list" id="openingsClubChecks">
                <p style="color:#aaa; font-size:0.85rem;">Loading…</p>
            </div>
            <div style="display:flex; align-items:center;">
                <button class="btn btn-secondary" onclick="saveOpeningsClubs()">Save</button>
                <span class="save-msg" id="openingsSaveMsg">✓ Saved</span>
            </div>
        </div>

    </main>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js?v=12"></script>
<script src="js/admin-auth.js"></script>
<script>
    const OPENINGS_ALL_CLUBS = ['Griswold', 'East Haddam', 'RHAMYS', 'Lebanon', 'WAM', 'Plainfield', 'NECONN'];

    async function loadOpeningsClubs() {
        const res = await supabaseClient.client
            .from('settings').select('value').eq('key', 'openings_clubs').maybeSingle();
        let active = [];
        try { active = JSON.parse(res.data?.value || '[]'); } catch(e) {}
        const wrap = document.getElementById('openingsClubChecks');
        wrap.innerHTML = OPENINGS_ALL_CLUBS.map(club => `
            <label>
                <input type="checkbox" value="${club}" ${active.includes(club) ? 'checked' : ''}>
                ${club}
            </label>`).join('');
    }

    async function saveOpeningsClubs() {
        const checks = document.querySelectorAll('#openingsClubChecks input[type=checkbox]');
        const selected = [...checks].filter(c => c.checked).map(c => c.value);
        await supabaseClient.client.from('settings')
            .update({ value: JSON.stringify(selected) }).eq('key', 'openings_clubs');
        const msg = document.getElementById('openingsSaveMsg');
        msg.style.display = 'inline';
        setTimeout(() => msg.style.display = 'none', 2000);
    }

    window.addEventListener('load', () => { loadOpeningsClubs(); });
</script>
</body>
</html>
