<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tournament Schedule</title>
    <script>
        // Redirect to club-game-submit in tournament mode
        // ?tournament=glastonbury-2025 → ?club=glastonbury-tournament
        // Can also accept ?club=glastonbury-tournament directly
        const p    = new URLSearchParams(window.location.search);
        const club = p.get('club');
        const t    = p.get('tournament');

        if (club) {
            window.location.replace(`club-game-submit.html?club=${encodeURIComponent(club)}`);
        } else {
            // Map tournament key → club slug (add entries as tournaments are created)
            const MAP = {
                'glastonbury-2025': 'glastonbury-tournament',
                'glastonbury-2026': 'glastonbury-tournament',
            };
            const slug = MAP[t] || 'glastonbury-tournament';
            window.location.replace(`club-game-submit.html?club=${encodeURIComponent(slug)}`);
        }
    </script>
    <style>
        body {
            background-color: #060e20 !important;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            ) !important;
        }

    </style>
</head>
<body></body>
</html>
