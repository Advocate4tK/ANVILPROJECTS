<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Schedule — Referee Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #060e20;
            background-image: repeating-linear-gradient(
                15deg, transparent, transparent 56px,
                rgba(255,255,255,0.016) 56px, rgba(255,255,255,0.016) 58px
            );
            font-family: 'DM Sans', sans-serif;
            color: #fff;
            min-height: 100vh;
        }

        .page-wrap {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 80px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 32px 0 24px;
        }

        .header-text { flex: 1; }

        .eyebrow {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: #00c853;
            margin-bottom: 8px;
        }

        .page-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 2.6rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 0.92;
        }

        .page-title .accent { color: #00c853; }

        .game-count {
            font-size: 0.78rem;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
            letter-spacing: 1px;
            min-height: 1.1em;
        }

        /* ── Logo mark (same as ref-openings) ── */
        .logo-mark {
            --sz: 110px;
            position: relative;
            width:  var(--sz);
            height: var(--sz);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lcard {
            position: absolute;
            border-radius: calc(var(--sz) * 0.065);
        }

        .lcard-red {
            width:  calc(var(--sz) * 0.58);
            height: calc(var(--sz) * 0.82);
            background: linear-gradient(145deg, #f87171 0%, #ef4444 55%, #b91c1c 100%);
            box-shadow: 0 calc(var(--sz)*0.02) calc(var(--sz)*0.12) rgba(239,68,68,0.45);
            top:  calc(var(--sz) * 0.21);
            left: calc(var(--sz) * 0.32);
            transform: rotate(22deg);
        }

        .lcard-yellow {
            width:  calc(var(--sz) * 0.64);
            height: calc(var(--sz) * 0.88);
            background: linear-gradient(145deg, #fde047 0%, #f59e0b 55%, #b45309 100%);
            box-shadow:
                0 0 calc(var(--sz)*0.2)  rgba(245,158,11,0.6),
                0 0 calc(var(--sz)*0.4)  rgba(245,158,11,0.2),
                0 calc(var(--sz)*0.05) calc(var(--sz)*0.18) rgba(0,0,0,0.5);
            top:  calc(var(--sz) * 0.12);
            left: calc(var(--sz) * 0.18);
            transform: rotate(10deg);
        }

        .logo-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: calc(var(--sz) * 0.10);
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            z-index: 10;
            line-height: 0.88;
            letter-spacing: 2px;
        }

        .logo-line1 {
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 24px rgba(0,0,0,0.7);
            font-size: calc(var(--sz) * 0.2);
        }

        .logo-line2 {
            color: #00c853;
            text-shadow: 0 2px 12px rgba(0,0,0,0.95), 0 0 28px rgba(0,200,83,0.5);
            font-size: calc(var(--sz) * 0.26);
            margin-top: calc(var(--sz) * -0.01);
            transform: skewX(-14deg);
            display: block;
        }

        .logo-underline {
            display: block;
            height: calc(var(--sz) * 0.022);
            width:  calc(var(--sz) * 0.58);
            margin-top: calc(var(--sz) * 0.025);
            background: #ef4444;
            border-radius: calc(var(--sz) * 0.01);
            box-shadow:
                0 0 calc(var(--sz)*0.012) #ef4444,
                0 0 calc(var(--sz)*0.04)  rgba(239,68,68,0.85),
                0 0 calc(var(--sz)*0.08)  rgba(239,68,68,0.5);
            transform: skewX(-14deg);
        }

        /* ── Controls bar ── */
        .controls-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(6, 14, 32, 0.93);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            padding: 12px 0 10px;
            margin-bottom: 6px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 9px;
        }

        .search-input {
            flex: 1;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            -webkit-appearance: none;
        }

        .search-input::placeholder { color: rgba(255,255,255,0.35); }
        .search-input:focus { border-color: #00c853; background: rgba(255,255,255,0.09); }

        .clear-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
            cursor: pointer;
            padding: 9px 12px;
            display: none;
            line-height: 1;
        }

        .clear-btn.visible { display: block; }

        .sort-row {
            display: flex;
            gap: 6px;
            margin-bottom: 0;
        }

        .sort-btn {
            flex: 1;
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: transparent;
            color: rgba(255,255,255,0.5);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.15s;
        }

        .sort-btn.active {
            background: #00c853;
            border-color: #00c853;
            color: #031a08;
        }

        /* ── Venue selector pill (club-selector pattern) ── */
        .venue-selector-row {
            display: none;
            margin-top: 9px;
        }

        .venue-selector {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 6px 16px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .venue-selector:hover {
            background: rgba(255,255,255,0.09);
            border-color: rgba(255,255,255,0.22);
        }

        .venue-selector.has-selection {
            border-color: #00c853;
            background: rgba(0,200,83,0.08);
        }

        .venue-selector-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .venue-selector.has-selection .venue-selector-label {
            color: rgba(0,200,83,0.6);
        }

        .venue-selector-name {
            flex: 1;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.55rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.65);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .venue-selector.has-selection .venue-selector-name {
            color: #00c853;
        }

        .venue-selector-arrow {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.4);
            flex-shrink: 0;
        }

        .venue-selector select {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            height: 100%;
        }

        /* ── Venue divider ── */
        .venue-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 22px 0 10px;
        }

        .venue-divider-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.05rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            white-space: nowrap;
        }

        .venue-divider-line {
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.12);
        }

        .venue-game-count {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.35);
            white-space: nowrap;
        }

        /* ── Period divider ── */
        .period-divider {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.35);
            margin: 18px 0 8px;
        }

        /* ── Game card ── */
        .game-card {
            background: #fff;
            border-radius: 12px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        .game-card-top {
            background: #edf1f7;
            padding: 9px 14px 8px;
            display: flex;
            align-items: baseline;
            gap: 10px;
            border-bottom: 1px solid #dce3ed;
        }

        .game-time {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.2rem;
            font-weight: 800;
            color: #1a1a2e;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        .game-venue-label {
            font-size: 0.76rem;
            color: #5a6a7a;
            font-weight: 500;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .game-card-body {
            padding: 10px 14px 0;
        }

        .game-matchup {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 10px;
            gap: 10px;
        }

        .game-teams {
            font-size: 0.92rem;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.3;
        }

        .game-teams .vs {
            font-weight: 400;
            color: #888;
            margin: 0 3px;
            font-size: 0.82rem;
        }

        .age-badge {
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .age-badge.comp { background: #e8eaf6; color: #3949ab; }
        .age-badge.rec  { background: #e8f5e9; color: #2e7d32; }
        .age-badge.u8   { background: #fff3e0; color: #e65100; }

        /* ── Ref slots grid (horizontal, like ref-openings) ── */
        .slots-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
            border-top: 1px solid #eef1f5;
        }

        .slots-row.one-slot {
            grid-template-columns: 1fr;
        }

        .slot-box {
            padding: 9px 10px 11px;
            border-right: 1px solid #eef1f5;
            text-align: center;
        }

        .slot-box:last-child { border-right: none; }

        .slot-label {
            font-size: 0.58rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #aab4c4;
            margin-bottom: 5px;
        }

        .slot-filled {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
            font-size: 0.7rem;
            font-weight: 700;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slot-filled mark {
            background: #bbf7d0;
            color: #14532d;
            border-radius: 2px;
        }

        .slot-open {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            animation: pulse-open 1.5s ease-in-out infinite;
        }

        @keyframes pulse-open {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(185,28,28,0.3); }
            50%       { opacity: 0.85; box-shadow: 0 0 0 4px rgba(185,28,28,0); }
        }

        /* ── States ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.35);
        }

        .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .empty-text { font-size: 0.9rem; }

        .loading-msg {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.45);
            font-size: 0.9rem;
        }

        .error-msg {
            background: rgba(220,38,38,0.1);
            border: 1px solid rgba(220,38,38,0.3);
            border-radius: 8px;
            padding: 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .page-title  { font-size: 2rem; }
            .logo-mark   { --sz: 76px; }
            .slots-row   { grid-template-columns: 1fr; }
            .slot-box    { border-right: none; border-bottom: 1px solid #eef1f5; }
            .slot-box:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
        <div class="header-text">
            <div class="eyebrow" id="headerEyebrow">TOURNAMENT · SCHEDULE</div>
            <h1 class="page-title">REFEREE<br><span class="accent">SCHEDULE</span></h1>
            <div class="game-count" id="gameCount"></div>
        </div>
        <div class="logo-mark">
            <div class="lcard lcard-red"></div>
            <div class="lcard lcard-yellow"></div>
            <div class="logo-text">
                <span class="logo-line1">Referee</span>
                <span class="logo-line2">Tool</span>
                <span class="logo-underline"></span>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
        <div class="search-row">
            <input type="search" id="refSearch" class="search-input"
                placeholder="Search by ref name…"
                autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            <button class="clear-btn" id="clearBtn" onclick="clearSearch()" title="Clear">✕</button>
        </div>
        <div class="sort-row">
            <button class="sort-btn active" id="sortTimeBtn" onclick="setSort('time')">Sort by Time</button>
            <button class="sort-btn" id="sortVenueBtn" onclick="setSort('venue')">Sort by Venue</button>
        </div>
        <div class="venue-selector-row" id="venueRow">
            <div class="venue-selector" id="venueSel">
                <span class="venue-selector-label">Venue</span>
                <span class="venue-selector-name" id="venueSelName">All Venues</span>
                <span class="venue-selector-arrow">▼</span>
                <select id="venueSelectNative" onchange="onVenueChange(this)">
                    <option value="">All Venues</option>
                </select>
            </div>
        </div>
    </div>

    <div id="gameList"><div class="loading-msg">Loading schedule…</div></div>

</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script>

let allGames     = [];
let venueMap     = {};
let fieldMap     = {};
let sortMode     = 'time';
let searchQuery  = '';
let selectedVenue = '';

// ─── Boot ────────────────────────────────────────────────────────────────────

async function boot() {
    const params = new URLSearchParams(window.location.search);
    const key    = params.get('key') || 'rhamboree';

    try {
        const { data: tourns } = await supabaseClient.client
            .from('tournaments')
            .select('name, from_date, to_date, key')
            .eq('key', key)
            .limit(1);

        const tourn      = tourns?.[0];
        const sourceName = tourn?.name || key.toUpperCase();

        if (tourn) {
            document.getElementById('headerEyebrow').textContent =
                `${sourceName} · ${fmtHeaderDate(tourn.from_date)}`;
            document.title = `${sourceName} — Referee Schedule`;
        }

        const [gamesRes, venuesRes, fieldsRes] = await Promise.all([
            supabaseClient.client
                .from('tournament_games')
                .select('id, date, time, "Age Group", "Home Team", "Away Team", "Center Referee", "AR 1", "AR 2", "Venue ID", "Field ID", "Gender", "Game Status"')
                .eq('Source Club', sourceName)
                .order('date')
                .order('time'),
            supabaseClient.client.from('venues')
                .select('id, "Venue ID", name, "Venue Name"')
                .limit(500),
            supabaseClient.client.from('fields')
                .select('id, "Field ID", name, venue_id')
                .limit(2000),
        ]);

        if (gamesRes.error) throw gamesRes.error;

        (venuesRes.data || []).forEach(v => {
            const name = v.name || v['Venue Name'] || '';
            if (v.id          != null) venueMap[String(v.id)]          = name;
            if (v['Venue ID'] != null) venueMap[String(v['Venue ID'])] = name;
        });

        (fieldsRes.data || []).forEach(f => {
            const name = f.name || '';
            if (f.id          != null) fieldMap[String(f.id)]          = name;
            if (f['Field ID'] != null) fieldMap[String(f['Field ID'])] = name;
        });

        allGames = (gamesRes.data || []).filter(g =>
            (g['Game Status'] || '').toLowerCase() !== 'cancelled'
        );

        populateVenueSelect();
        render();

    } catch (err) {
        console.error(err);
        document.getElementById('gameList').innerHTML =
            `<div class="error-msg">Failed to load schedule — please try refreshing.<br><small>${escHtml(err.message || '')}</small></div>`;
    }
}

// ─── Venue select ─────────────────────────────────────────────────────────────

function populateVenueSelect() {
    const venues = [...new Set(
        allGames.map(g => getVenueName(g)).filter(v => v !== '—')
    )].sort();
    const sel = document.getElementById('venueSelectNative');
    sel.innerHTML = '<option value="">All Venues</option>' +
        venues.map(v => `<option value="${escHtml(v)}">${escHtml(v)}</option>`).join('');
}

function onVenueChange(sel) {
    selectedVenue = sel.value;
    const container = document.getElementById('venueSel');
    const nameEl    = document.getElementById('venueSelName');
    if (selectedVenue) {
        container.classList.add('has-selection');
        nameEl.textContent = selectedVenue;
    } else {
        container.classList.remove('has-selection');
        nameEl.textContent = 'All Venues';
    }
    render();
}

// ─── Render ──────────────────────────────────────────────────────────────────

function render() {
    const q = searchQuery.trim().toLowerCase();

    const games = q
        ? allGames.filter(g =>
            ['Center Referee', 'AR 1', 'AR 2'].some(f => {
                const n = g[f];
                return n && String(n).toLowerCase().includes(q);
            }))
        : allGames;

    document.getElementById('gameCount').textContent =
        q ? `${games.length} of ${allGames.length} games` : `${allGames.length} games`;

    if (!games.length) {
        document.getElementById('gameList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🔍</div>
                <div class="empty-text">${q ? `No games found for "${escHtml(searchQuery)}".` : 'No games found.'}</div>
            </div>`;
        return;
    }

    document.getElementById('gameList').innerHTML =
        sortMode === 'venue' ? renderByVenue(games, q) : renderByTime(games, q);
}

function renderByTime(games, q) {
    const parts = [];
    let lastPeriod = null;
    games.forEach(g => {
        const p = timePeriod(g.time);
        if (p !== lastPeriod) {
            parts.push(`<div class="period-divider">${p}</div>`);
            lastPeriod = p;
        }
        parts.push(cardHtml(g, q));
    });
    return parts.join('');
}

function renderByVenue(games, q) {
    // Single venue selected — show its games sorted by time with period dividers
    if (selectedVenue) {
        const vGames = games.filter(g => getVenueName(g) === selectedVenue);
        if (!vGames.length) {
            return `<div class="empty-state"><div class="empty-icon">🏟️</div><div class="empty-text">No games at ${escHtml(selectedVenue)}.</div></div>`;
        }
        const parts = [];
        let lastPeriod = null;
        vGames.forEach(g => {
            const p = timePeriod(g.time);
            if (p !== lastPeriod) {
                parts.push(`<div class="period-divider">${p}</div>`);
                lastPeriod = p;
            }
            parts.push(cardHtml(g, q));
        });
        return parts.join('');
    }

    // All venues — group alphabetically
    const groups = new Map();
    games.forEach(g => {
        const v = getVenueName(g);
        if (!groups.has(v)) groups.set(v, []);
        groups.get(v).push(g);
    });

    return [...groups.entries()]
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([v, vGames]) => `
            <div class="venue-divider">
                <span class="venue-divider-label">${escHtml(v)}</span>
                <span class="venue-divider-line"></span>
                <span class="venue-game-count">${vGames.length} game${vGames.length !== 1 ? 's' : ''}</span>
            </div>
            ${vGames.map(g => cardHtml(g, q)).join('')}
        `).join('');
}

function cardHtml(g, q) {
    const time   = fmtTime(g.time);
    const venue  = getVenueName(g);
    const field  = g['Field ID'] != null ? (fieldMap[String(g['Field ID'])] || '') : '';
    const loc    = field ? `${venue} · ${field}` : venue;
    const age    = g['Age Group'] || '';
    const home   = g['Home Team'] || '?';
    const away   = g['Away Team'] || '?';
    const isU8   = /^U-?8\b/i.test(age);
    const isComp = /comp/i.test(age) || /^U-?1[4-9]\b/i.test(age);
    const ageCls = isU8 ? 'u8' : isComp ? 'comp' : 'rec';

    const slots = isU8
        ? slotHtml('Center', g['Center Referee'], q)
        : slotHtml('Center', g['Center Referee'], q) +
          slotHtml('AR 1',   g['AR 1'], q) +
          slotHtml('AR 2',   g['AR 2'], q);

    return `
    <div class="game-card">
        <div class="game-card-top">
            <span class="game-time">${time}</span>
            <span class="game-venue-label">${escHtml(loc)}</span>
        </div>
        <div class="game-card-body">
            <div class="game-matchup">
                <span class="game-teams">${escHtml(home)} <span class="vs">vs</span> ${escHtml(away)}</span>
                <span class="age-badge ${ageCls}">${escHtml(age)}</span>
            </div>
        </div>
        <div class="slots-row${isU8 ? ' one-slot' : ''}">
            ${slots}
        </div>
    </div>`;
}

function slotHtml(label, raw, q) {
    const name   = raw && String(raw).trim();
    const filled = name && name.toUpperCase() !== 'FILLED';
    const badge  = filled
        ? `<span class="slot-filled">${highlight(escHtml(name), q)}</span>`
        : `<span class="slot-open">Open</span>`;
    return `
    <div class="slot-box">
        <div class="slot-label">${label}</div>
        ${badge}
    </div>`;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function getVenueName(g) {
    if (g['Venue ID'] == null) return '—';
    return venueMap[String(g['Venue ID'])] || '—';
}

function timePeriod(t) {
    if (!t) return 'Unscheduled';
    const h = parseInt(t.split(':')[0], 10);
    if (h < 12) return 'Morning';
    if (h < 17) return 'Afternoon';
    return 'Evening';
}

function fmtTime(t) {
    if (!t) return '—';
    const [hStr, mStr] = t.split(':');
    const h = parseInt(hStr, 10);
    return `${h % 12 || 12}:${mStr || '00'} ${h >= 12 ? 'PM' : 'AM'}`;
}

function fmtHeaderDate(d) {
    if (!d) return '';
    const [, mo, day] = d.split('-').map(Number);
    return `${['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][mo]} ${day}`;
}

function escHtml(s) {
    return String(s ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(str, q) {
    if (!q) return str;
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return str.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
}

// ─── Controls ────────────────────────────────────────────────────────────────

function setSort(mode) {
    sortMode = mode;
    document.getElementById('sortTimeBtn').classList.toggle('active', mode === 'time');
    document.getElementById('sortVenueBtn').classList.toggle('active', mode === 'venue');
    document.getElementById('venueRow').style.display = mode === 'venue' ? 'block' : 'none';
    if (mode === 'time') {
        selectedVenue = '';
        document.getElementById('venueSelectNative').value = '';
        document.getElementById('venueSel').classList.remove('has-selection');
        document.getElementById('venueSelName').textContent = 'All Venues';
    }
    render();
}

function clearSearch() {
    document.getElementById('refSearch').value = '';
    searchQuery = '';
    document.getElementById('clearBtn').classList.remove('visible');
    render();
}

document.getElementById('refSearch').addEventListener('input', function () {
    searchQuery = this.value;
    document.getElementById('clearBtn').classList.toggle('visible', !!this.value);
    render();
});

boot();
</script>
